name: Deploy Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'pyproject.toml'
      - 'scripts/validate_docs.py'
      - '.github/actions/setup-artifex/action.yml'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Artifex docs environment
        uses: ./.github/actions/setup-artifex
        with:
          python-version: '3.11'
          cache-suffix: docs-py311
          linux-editable-target: ".[docs]"

      - name: Validate documentation contract
        run: uv run python scripts/validate_docs.py --config-path mkdocs.yml --docs-path docs --src-path src

      - name: Build documentation
        run: uv run mkdocs build --clean --strict

      - name: Prepare deployment directory
        run: |
          # Create deployment structure
          mkdir -p deploy/artifex

          # Move built site into artifex subdirectory
          mv site/* deploy/artifex/

          # Create CNAME file at root for custom domain
          echo "docs.avitai.bio" > deploy/CNAME

          # Create index.html at root as landing page for all projects
          cat > deploy/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
              <meta charset="utf-8">
              <title>Avitai Documentation</title>
              <style>
                  body {
                      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
                      max-width: 800px;
                      margin: 100px auto;
                      padding: 20px;
                      text-align: center;
                  }
                  h1 { color: #333; }
                  ul { list-style: none; padding: 0; }
                  li { margin: 10px 0; }
                  a {
                      color: #0066cc;
                      text-decoration: none;
                      font-size: 18px;
                      padding: 10px 20px;
                      display: inline-block;
                      border: 1px solid #0066cc;
                      border-radius: 5px;
                      transition: all 0.3s;
                  }
                  a:hover {
                      background: #0066cc;
                      color: white;
                  }
              </style>
          </head>
          <body>
              <h1>Avitai Documentation</h1>
              <p>Available documentation:</p>
              <ul>
                  <li><a href="./artifex/">Artifex - Generative Models Library</a></li>
              </ul>
          </body>
          </html>
          EOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          force_orphan: true
          cname: docs.avitai.bio
