name: Security

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

jobs:
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Artifex
        uses: ./.github/actions/setup-artifex
        with:
          python-version: "3.11"
          cache-suffix: security
          linux-editable-target: ".[dev]"

      - name: Load reviewed vulnerability ignores
        id: reviewed_ignores
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY' >> "$GITHUB_OUTPUT"
          import tomllib
          from pathlib import Path

          pyproject = tomllib.loads(Path("pyproject.toml").read_text())
          reviewed = pyproject["tool"]["artifex"]["ci"]["security"]["reviewed_ignores"]
          ignore_args = " ".join(f"--ignore-vuln {entry['id']}" for entry in reviewed)
          print(f"ignore_args={ignore_args}")
          PY

      - name: Run security scans
        shell: bash
        run: |
          set -euo pipefail

          pip_audit_status=0
          bandit_status=0

          uv run --with pip-audit pip-audit --local --desc \
            ${{ steps.reviewed_ignores.outputs.ignore_args }} \
            > pip-audit-report.txt || pip_audit_status=$?

          uv run --with bandit bandit -c pyproject.toml -r src/artifex/ -f json -o bandit-report.json \
            || bandit_status=$?

          {
            echo "## Security audit"
            echo
            echo "This workflow participates in automatic pull-request and push enforcement."
            echo "The reviewed ignore list stays centralized in pyproject so external contributions are screened against the same tracked policy on every change."
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "$pip_audit_status" -ne 0 || "$bandit_status" -ne 0 ]]; then
            exit 1
          fi

      - name: Upload security report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-report
          path: |
            pip-audit-report.txt
            bandit-report.json
