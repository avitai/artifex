name: protein_dataset_default
description: Default typed config for protein dataset loading.
dataset_name: protein_dataset
data_dir: "{ARTIFEX_DATA_ROOT}/protein_dataset"
split: train
num_workers: 4
prefetch_factor: 2
pin_memory: false
shuffle: true
drop_remainder: true
prefetch_size: 2
augmentation: false
validation_split: 0.1
test_split: 0.1
metadata:
  cache_dir: "{ARTIFEX_CACHE_ROOT}/protein_dataset"
  splits_file: "{ARTIFEX_DATA_ROOT}/protein_dataset/splits.json"
  max_seq_length: 128
  backbone_atom_indices: [0, 1, 2, 3]
  precompute_statistics: true
  normalize_coordinates: true
  center_coordinates: true
  random_rotation: false
