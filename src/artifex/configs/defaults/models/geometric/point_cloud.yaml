name: default_point_cloud_model
description: Default typed config for point-cloud generation models.
network:
  name: point_cloud_network
  hidden_dims: [128, 128, 128, 128]
  activation: gelu
  embed_dim: 128
  num_heads: 4
  num_layers: 4
  dropout_rate: 0.1
  use_positional_encoding: true
num_points: 512
point_dim: 3
dropout_rate: 0.1
