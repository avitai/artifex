experiment_name: protein_diffusion_distributed
seed: 42
output_dir: "{ARTIFEX_OUTPUT_ROOT}/protein_diffusion_distributed/"

# Reference to config files
model_config: models/geometric/protein_point_cloud.yaml
data_config: data/protein_dataset.yaml
training_config: training/protein_diffusion_training.yaml
inference_config: inference/protein_diffusion_inference.yaml

# Distributed training configuration
distributed_config: distributed/default.yaml

# Hyperparameter search configuration (for tuning)
hyperparam_config: hyperparam/diffusion_hyperparameter_search.yaml

# Logging settings
log_level: INFO
use_wandb: true
wandb_project: protein-diffusion-distributed

# Override specific settings from default configs
overrides:
  # Model overrides
  model:
    num_residues: 256
    num_points: 1024
    network:
      embed_dim: 256
      num_layers: 12
      num_heads: 8
      dropout_rate: 0.1

  # Data overrides
  data:
    data_dir: "{ARTIFEX_DATA_ROOT}/cath_dataset"
    metadata:
      cache_dir: "{ARTIFEX_CACHE_ROOT}/cath_dataset"
      max_seq_length: 256
      splits_file: "{ARTIFEX_DATA_ROOT}/cath_dataset/chain_set_splits.json"

  # Training overrides
  training:
    num_epochs: 100
    batch_size: 32  # Per-GPU batch size
    optimizer:
      learning_rate: 5.0e-5
      weight_decay: 1.0e-6
    scheduler:
      warmup_steps: 1000

  # Inference overrides
  inference:
    num_samples: 20
    target_seq_length: 256
    save_intermediate_steps: true

  # Distributed training overrides
  distributed:
    enabled: true
    backend: nccl
    world_size: 8
    num_nodes: 1
    num_processes_per_node: 8
    tensor_parallel_size: 2
    mixed_precision: bf16
