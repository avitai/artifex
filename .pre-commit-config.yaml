# SciML Pre-commit Configuration
# Enhanced for complete code quality
# Optimized for performance and reduced package installations

repos:
  # TOML formatting
  - repo: local
    hooks:
      - id: sort_pyproject
        name: sort_pyproject
        entry: toml-sort
        language: python
        args: [-i, --sort-table-keys, --sort-inline-tables, pyproject.toml]
        files: ^pyproject\.toml$
        additional_dependencies: ["toml-sort==0.23.1"]

  # Standard pre-commit hooks with scientific computing adaptations
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: &repo_non_source_exclude ^(?:m[^/]*ry-bank|documents|custom_modes|\.[^/]*sor|notebooks)/
      - id: end-of-file-fixer
        exclude: *repo_non_source_exclude
      - id: check-yaml
        exclude: &repo_yaml_syntax_exclude ^(?:m[^/]*ry-bank|documents|custom_modes|\.[^/]*sor)/(?:.*)|mkdocs\.yml$
      - id: check-added-large-files
        args: ["--maxkb=2000"] # Increased for scientific data files
        exclude: *repo_non_source_exclude
      - id: check-merge-conflict
      - id: check-toml
      - id: check-json
        exclude: &repo_non_source_and_vscode_exclude ^(?:m[^/]*ry-bank|documents|custom_modes|\.[^/]*sor|notebooks|\.vscode)/
      - id: debug-statements
        exclude: *repo_non_source_exclude
      - id: mixed-line-ending
        exclude: *repo_non_source_exclude

  # Artifex-inspired complete Python linting and formatting with auto-fix
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.13
    hooks:
      - id: ruff # linter with automatic fixes including whitespace and unused variables
        args: [--fix, --unsafe-fixes]
        exclude: *repo_non_source_exclude
        types_or: [python, pyi, jupyter]
      - id: ruff-format # formatter
        types_or: [python, pyi, jupyter]
        exclude: *repo_non_source_exclude

  # GitHub Actions simulation - exact mirror of CI checks
  - repo: local
    hooks:
      - id: ruff-docstring-whitespace
        name: ruff-docstring-whitespace (auto-fix whitespace)
        entry: ruff check --select=W291,W292,W293,F841 --fix --unsafe-fixes
        language: system
        types: [python]
        exclude: *repo_non_source_exclude
        pass_filenames: true
      - id: ruff-github-actions-check
        name: ruff-github-actions-check (mirrors CI)
        entry: uv run ruff check --output-format=github
        language: system
        types: [python]
        exclude: *repo_non_source_exclude
        pass_filenames: false
        always_run: true
      - id: ruff-critical-check
        name: ruff-critical-check (fast CI-critical rules only)
        entry: uv run ruff check --select=RUF005,B904,F821,F822,F823 --output-format=github
        language: system
        types: [python]
        exclude: *repo_non_source_exclude
        pass_filenames: false
        always_run: true
      - id: flake8-functions-names
        name: flake8-functions-names (FNE)
        entry: uv run flake8 --select=FNE src tests
        language: system
        types: [python]
        stages: [manual]
        pass_filenames: false
      - id: flake8-wemake-wps233
        name: flake8-wemake WPS233
        entry: uv run flake8 --select=WPS233 src tests
        language: system
        types: [python]
        stages: [manual]
        pass_filenames: false
      - id: pylint-targeted-guide-checks
        name: pylint targeted guide checks
        entry: >-
          uv run pylint --disable=all
          --enable=duplicate-code,too-many-public-methods,too-many-instance-attributes,too-few-public-methods,too-many-ancestors,inconsistent-return-statements
          --reports=no --score=no src/artifex
        language: system
        types: [python]
        stages: [manual]
        pass_filenames: false
      - id: check-file-length
        name: check-file-length (warn >1500, fail >2000 lines)
        entry: bash
        args:
          - -c
          - |
            for file in "$@"; do
              lines=$(wc -l < "$file" 2>/dev/null || echo 0)
              if [ "$lines" -gt 2000 ]; then
                echo "ERROR: $file has $lines lines (limit: 2000)"
                exit 1
              elif [ "$lines" -gt 1500 ]; then
                echo "WARNING: $file has $lines lines (approaching limit of 2000)"
              fi
            done
          - --
        language: system
        types: [python]
        exclude: &repo_non_source_and_tests_exclude ^(?:m[^/]*ry-bank|documents|custom_modes|\.[^/]*sor|notebooks|tests)/

  # Reuse the checked-in environment for typing so pre-commit stays hermetic.
  - repo: local
    hooks:
      - id: pyright
        name: pyright (project environment)
        entry: uv run pyright --warnings
        language: system
        types_or: [python, pyi]
        files: ^src/.*\.py$
        pass_filenames: true

  # Artifex-inspired security scanning
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.6
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml"]
        exclude: *repo_non_source_and_tests_exclude
        additional_dependencies: ["bandit[toml]"]
        log_file: /dev/null # Suppress stderr warnings

  # Docstring coverage check
  - repo: https://github.com/econchick/interrogate
    rev: 1.7.0
    hooks:
      - id: interrogate
        args: ["-c", "pyproject.toml", "src/artifex"]
        exclude: &repo_non_source_tests_and_examples_exclude ^(?:m[^/]*ry-bank|documents|custom_modes|\.[^/]*sor|notebooks|tests|examples)/
        pass_filenames: false

  # Artifex-inspired notebook quality
  - repo: https://github.com/nbQA-dev/nbQA
    rev: 1.9.1
    hooks:
      - id: nbqa-ruff
        exclude: *repo_non_source_exclude
        args: [--fix]

  # Artifex-inspired shell script quality
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        exclude: *repo_non_source_exclude
        args: ["-e", "SC1091"] # Allow sourcing files not found by shellcheck

  # Markdown quality and formatting
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.45.0
    hooks:
      - id: markdownlint-fix
        exclude: *repo_non_source_exclude

  # Artifex-inspired Dockerfile quality (if we add Docker later)
  # Temporarily disabled due to installation issues
  # - repo: https://github.com/hadolint/hadolint
  #   rev: v2.13.1-beta
  #   hooks:
  #     - id: hadolint-docker
  #       exclude: ^(m[^/]*ry-bank|documents|custom_modes|\.[^/]*sor|notebooks)/

# CI Configuration - no autofix, manual testing before commits
ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit.com hooks

    for more information, see https://pre-commit.ci
  autofix_prs: false           # No automatic commits - run tests manually first
  autoupdate_branch: ""
  autoupdate_commit_msg: "[pre-commit.ci] pre-commit autoupdate"
  autoupdate_schedule: weekly  # Keep hooks up to date
  skip: []
  submodules: false
