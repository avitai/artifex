    - foundation_model

maintenance_contract:
  - Re-run the gate when a candidate acquires materially different probability semantics or tractable queries.
  - Do not change a decision because one architecture, benchmark, vendor system, or sampler becomes popular.
  - Verify time-sensitive evidence and venue status before every book release.
  - Preserve the distinction between immediate canonical coverage and completion of a standalone volume.
  - Add every accepted family to the cross-family coverage matrix and prerequisite-aware navigation.
