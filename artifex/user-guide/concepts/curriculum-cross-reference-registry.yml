  description: Exact finite structural causal models verify semantics and implementation. Synthetic stress
    tests vary assumptions. Semi-synthetic data add realistic covariates. Held-out interventions test
    supported population effects. Prospective domain validation tests transport, operations, and harm.
    At every rung, invalid, failed, abstained, and unsafe cases remain in the fixed denominator.
