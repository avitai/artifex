  caption_review_status: authored
  description: A continuous model and a finite executable solver define related but distinct derivative
    targets. The finite branch records tolerances, events, interpolation, random increments, resampling,
    and truncation. The continuous branch records sensitivity equations and regularity. Agreement is tested
    under mesh and tolerance refinement rather than inferred from the word adjoint.
