  caption: One transition can contain a complete conditional generative model
  caption_source: authored_acc_title
  caption_review_status: authored
  description: An expensive outer backbone encodes the current state and history. A conditional head then
    represents a stochastic kernel and may run several internal flow or diffusion updates before emitting
    the next state. Repeating outer transitions propagates both conditional modeling error and history
    shift.
  description_status: authored
