  caption: Choosing geometry and derivative semantics for an implicit generator
  caption_source: authored_acc_title
  caption_review_status: authored
  description: An implicit endpoint law is first checked for domination and local divergence regularity.
    A regular law can support Fisher geometry. A singular law requires an explicitly changed construction
    such as smoothing, transport or Sinkhorn geometry, or a latent or data-manifold metric. Separately,
    adversarial training chooses simultaneous, alternating, unrolled, or implicit best-response derivatives;
    geometry does not choose that game semantics.
  description_status: authored
