  caption: Endpoint consistency and two-time flow maps impose different contracts
  caption_source: authored_acc_title
  caption_review_status: authored
  description: Endpoint consistency maps every state on one trajectory to a common data endpoint. A two-time
    map accepts source and destination times and should satisfy identity and composition. Both need an
    anchor to the intended data law, and stochastic multistep sampling adds a new kernel when noise is
    injected.
  description_status: authored
