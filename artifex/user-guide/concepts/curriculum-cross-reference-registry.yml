  caption: Locating the Fisher and its expectation bottleneck across model families
  caption_source: authored_acc_title
  caption_review_status: authored
  description: A declared statistical family determines a score and model expectation. Autoregressive
    models decompose that expectation over model histories, flows provide direct samples but retain a
    large matrix, VAEs expose several different families, and energy models require equilibrium moments.
    Structured tractability can simplify an expectation without changing which Fisher was defined.
  description_status: authored
