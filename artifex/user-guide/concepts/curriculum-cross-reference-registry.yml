  caption: Dual-coordinate reasoning in a minimal exponential family
  caption_source: authored_acc_title
  caption_review_status: authored
  description: Natural coordinates pass through the log-partition gradient to mean coordinates. The Hessian
    is both the Jacobian of that map and the Fisher metric. An ordinary natural-coordinate covector is
    converted by the inverse Fisher into a tangent direction, which has mean-coordinate components given
    by the corresponding dual gradient.
  description_status: authored
