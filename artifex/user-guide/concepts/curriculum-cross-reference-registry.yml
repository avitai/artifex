scope:
  policy: Number only display objects that the prose references or that serve as stable derivation landmarks.
    Unnumbered teaching displays remain valid; the migration queue must not be reported as complete until
    every reference-worthy equation, figure, table, algorithm, and theorem has been reviewed.
  numbering_scheme: Stable volume-local symbolic numbers use an uppercase volume code and a one-based
    ordinal. They are independent of website navigation order so a moved guide does not silently change
    a published reference.
  source_syntax: Equations retain Markdown display delimiters and add one TeX tag and label. References
    use inline TeX eqref. This source is processed by Arithmatex and MathJax online and by AMS math, hyperref,
    and cleveref in the publication pipeline.
  publication_pipeline_status: figures_and_tables_registered
  supported_object_types:
  - equation
  - figure
  - table
  pending_object_types:
  - algorithm
  - theorem
label_contract:
  equation_prefix: 'eq:'
  display_number_pattern: ^[A-Z][A-Z0-9]*\.[1-9][0-9]*$
  source_review_status_required: reviewed
  one_label_definition_per_object: true
  prefixes:
    equation: 'eq:'
    figure: 'fig:'
    table: 'tab:'
    algorithm: 'alg:'
    theorem: 'thm:'
  render_prefixes:
    figure: fig-
    table: tbl-
  unique_display_numbers_within_object_type: true
  authored_reference_required_for:
  - equation
  reference_review_pending_for:
  - figure
  - table
