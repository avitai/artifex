  caption: Six chapters turn local dynamics into an audited few-step program
  caption_source: authored_acc_title
  caption_review_status: authored
  description: The book first separates infinitesimal dynamics from finite maps and kernels, then studies
    endpoint consistency and two-time maps, average velocities and shortcuts, expressive transition kernels
    and continuous autoregression, teacher distillation, and finally matched evidence and deployment accounting.
  description_status: authored
