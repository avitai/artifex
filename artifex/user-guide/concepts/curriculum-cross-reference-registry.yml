  caption: Instantaneous average and shortcut velocities answer different interval questions
  caption_source: authored_acc_title
  caption_review_status: authored
  description: An instantaneous field is local at one state and time. Integrating it defines an exact
    displacement and interval-average velocity. MeanFlow constrains that average with a differential identity,
    while shortcut models constrain a step-conditioned update by agreement between one long jump and two
    shorter jumps.
  description_status: authored
