  caption: Choosing a stochastic gradient representation without changing its target silently
  caption_source: authored_acc_title
  caption_review_status: authored
  description: The decision begins with an exact finite sum or analytic expectation. If unavailable, a
    differentiable parameter-free noise map supports a pathwise estimator, a differentiable probability
    mass or density supports a score estimator, and a signed-measure decomposition supports a weak derivative.
    Relaxations and straight-through rules branch to explicitly changed or custom targets. Every branch
    returns to exact small-case bias and variance checks.
  description_status: authored
