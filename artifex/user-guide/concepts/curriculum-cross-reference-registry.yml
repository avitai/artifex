  source_end_line: 144
  source_block_sha256: 31f911bc60df286543b5629ae9f16f046b00ecd40af40e73eef06be3511cf1c2
  caption: The word step can refer to different mathematical and computational objects
  caption_source: authored_acc_title
  caption_review_status: authored
  description: Local dynamics induce an exact finite propagator. A learned map or kernel approximates
    that propagator. A finite inference program composes learned calls and numerical operations. The deployed
    system adds guidance codecs and hardware costs, so none of these layers can be inferred from the word
    step alone.
  description_status: authored
