  - id: bnp-bernoulli-crm-local-finiteness
    guide: bayesian-nonparametric-models-explained.md
    anchor: why-infinitely-many-atoms-can-yield-a-finite-row
    maturity: Established
    status: levy-integrability-bounded
    claim: >-
      Under a beta--Bernoulli or more general Bernoulli completely random
      measure construction, Poisson thinning gives finitely many active
      features per row when the weight-integrated Levy intensity is finite,
      even if the unweighted global atom intensity is infinite.
    evidence:
      - url: https://doi.org/10.1214/13-BA823
        version: Broderick, Pitman, and Jordan, Bayesian Analysis 8(4), 2013
      - url: https://proceedings.mlr.press/v2/thibaux07a.html
