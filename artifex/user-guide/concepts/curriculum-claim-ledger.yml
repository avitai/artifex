  - id: classical-bernoulli-mixture-nonidentifiability
    guide: classical-generative-models.md
    anchor: 6-diagnose-what-the-data-cannot-identify
    maturity: Established
    status: independently-derived-finite-law
    claim: >-
      A finite mixture of univariate Bernoulli components has an observed
      Bernoulli law whose success probability is the mixture-weighted component
      mean, so a single binary coordinate cannot identify the component weights
      and means even when responsibilities are computed exactly for fixed
      parameters.
    evidence:
      - url: https://doi.org/10.1111/j.2517-6161.1977.tb01600.x
        version: JRSS B 1977 EM framework; finite specialization independently checked
    verified: 2026-07-14

