    verified: 2026-07-15

  - id: score-distillation-pseudoloss-boundary
    guide: gradients-and-geometry-in-generative-modeling.md
    anchor: score-distillation-transfers-a-state-field-through-a-generator
    maturity: Peer-reviewed research
    status: installed-vector-jacobian-product-and-global-divergence-separated
    claim: >-
      A stopped teacher or score-difference field can be pulled through a
      differentiable generator by a pseudo-loss, but its scalar value does not
      prove that the installed update is an integrable gradient of a declared
      distributional divergence; source-score, weighting, and guidance choices
      determine the target.
