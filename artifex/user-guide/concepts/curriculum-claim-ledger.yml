    maturity: Established
    status: objective-and-optimization-bounded
    claim: >-
      Exact EM, variational EM, and VAE-style amortized stochastic learning use
      the same evidence decomposition but differ in whether the E-step posterior
      is exact, family-restricted, shared through an inference network, and
      optimized with stochastic estimators; they therefore do not inherit the
