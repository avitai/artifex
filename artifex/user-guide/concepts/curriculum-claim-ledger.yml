    verified: 2026-07-14

  - id: bnp-infinite-prior-finite-computation-boundary
    guide: bayesian-nonparametric-models-explained.md
    anchor: worked-comparison-one-finite-state-six-algorithmic-readings
    maturity: Interpretive synthesis
    status: algorithm-bounded
    claim: >-
      Finite occupied structure in a finite dataset, a finite conditional set of
      instantiated atoms in slice or retrospective computation, and a fixed
      deterministic truncation are distinct objects; finite work at one
      iteration does not imply that the target prior has become finite-dimensional.
    evidence:
