    verified: 2026-07-14

  - id: bnp-partition-feature-allocation-boundary
    guide: bayesian-nonparametric-models-explained.md
    anchor: from-one-label-to-many-features
    maturity: Established
    status: generated-object-bounded
    claim: >-
      An exchangeable partition assigns every item to exactly one block, whereas
      an Indian-buffet-process feature allocation permits several active features
      for one item and is invariant to feature-column relabeling; neither prior
      supplies an observation likelihood or semantic identifiability by itself.
    evidence:
      - url: https://proceedings.neurips.cc/paper/2005/hash/2ef35a8b78b572a47f56846acbeef5d3-Abstract.html
        version: NeurIPS 2005 Indian buffet process construction
      - url: https://proceedings.mlr.press/v2/thibaux07a.html
        version: AISTATS 2007 beta-process relationship
    verified: 2026-07-14

