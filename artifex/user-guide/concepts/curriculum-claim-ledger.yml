      - url: https://proceedings.neurips.cc/paper_files/paper/2024/hash/54dcf25318f9de5a7a01f0a4125c541e-Abstract-Conference.html
        version: NeurIPS 2024 distribution matching distillation
      - url: https://proceedings.neurips.cc/paper_files/paper/2024/hash/d107ca794d83c8242e357e6a43a068f4-Abstract-Conference.html
        version: NeurIPS 2024 score implicit matching
    verified: 2026-07-15

  - id: nonsmooth-update-semantics-boundary
    guide: gradients-and-geometry-in-generative-modeling.md
    anchor: nonsmooth-and-constrained-updates
    maturity: Established
    status: subgradient-proximal-mirror-projected-and-surrogate-updates-separated
    claim: >-
      Subgradients, proximal maps, mirror steps, projections, and Riemannian
      gradients solve different local problems; straight-through
      differentiation across a hard projection is a surrogate unless a valid
      derivative or implicit-system argument is supplied.
    evidence:
      - url: https://jmlr.org/papers/v21/17-678.html
        version: JMLR 2020 natural-gradient and mirror-descent boundaries
      - url: https://web.stanford.edu/~boyd/papers/prox_algs.html
