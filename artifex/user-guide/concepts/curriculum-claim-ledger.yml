    maturity: Established
    status: quotient-space-and-invariance-bounded
    claim: >-
      An unlabeled graph probability is the sum of labeled masses over its
      relabeling orbit; multiplying one labeled mass by n!/|Aut(G)| is valid
      only when the labeled law is invariant across that orbit and every
      declared attribute is included in the stabilizer.
