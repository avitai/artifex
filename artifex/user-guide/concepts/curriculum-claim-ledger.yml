    status: latent-prior-likelihood-and-inference-separated
    claim: >-
      A GP prior plus Gaussian observation noise has an analytic Gaussian
      posterior, while non-Gaussian likelihoods generally require approximate
      inference or Monte Carlo; a log-Gaussian Cox-process likelihood includes
