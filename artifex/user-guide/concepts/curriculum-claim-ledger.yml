    maturity: Established
    status: model-posterior-kernel-and-numerics-separated
    claim: >-
      GP scalability methods approximate different objects: subsets discard
      observations, random features and Nyström methods approximate kernels,
      sparse variational methods approximate posterior inference for a declared
      GP, SKI approximates structured matrix operations, iterative solvers add
      numerical and stochastic-estimator error, and state-space methods require
      an exact or approximated Markov representation. One complexity label does
      not make these methods statistically equivalent.
    evidence:
      - url: https://proceedings.mlr.press/v5/titsias09a.html
        version: AISTATS 2009 variational inducing variables
      - url: https://proceedings.mlr.press/v37/wilson15.html
