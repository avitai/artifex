    verified: 2026-07-15

  - id: solver-adjoint-discretization-boundary
    guide: gradients-and-geometry-in-generative-modeling.md
    anchor: solver-output-is-a-parameterized-computation
    maturity: Established
    status: continuous-sensitivity-and-discrete-solver-derivative-separated
    claim: >-
      A continuous adjoint and reverse differentiation through a discretized
      solver coincide only under appropriate convergence conditions; finite
      tolerances, adaptive control flow, interpolation, reconstruction, and
      stochastic trace estimates are part of the implemented derivative.
    evidence:
      - url: https://proceedings.mlr.press/v118/li20a.html
        version: AABI 2020 SDE adjoint sensitivities
    verified: 2026-07-15

  - id: sampler-unrolling-target-boundary
    guide: gradients-and-geometry-in-generative-modeling.md
    anchor: mcmc-smc-and-resampling-create-target-choices
    maturity: Established
    status: finite-chain-equilibrium-and-resampling-surrogate-targets-separated
    claim: >-
      Differentiating through K sampler transitions targets the finite-K
      pushforward; truncation, stopped resampling gradients, score corrections,
      and transport relaxations define different estimators or algorithms and
      do not automatically equal an equilibrium-law derivative.
    evidence:
      - url: https://proceedings.mlr.press/v139/corenflos21a.html
        version: ICML 2021 differentiable transport resampling
    verified: 2026-07-15

  - id: trajectory-policy-gradient-law-boundary
    guide: gradients-and-geometry-in-generative-modeling.md
    anchor: reward-gradients-for-autoregressive-and-iterative-generators
    maturity: Established
    status: sampled-trajectory-score-and-supervised-preference-gradient-separated
    claim: >-
      A policy gradient for an autoregressive or iterative generator is a
      likelihood-ratio derivative under its sampled trajectory law and requires
      valid credit assignment and sampling corrections; a differentiable
      preference loss on fixed examples is not thereby a policy gradient.
    evidence:
      - url: https://proceedings.neurips.cc/paper_files/paper/2023/hash/fc65fab891d83433bd3c8d966edde311-Abstract-Conference.html
        version: NeurIPS 2023 diffusion policy optimization
      - url: https://proceedings.neurips.cc/paper_files/paper/2024/hash/124256ed80af5d4bf4c4de17b66c4298-Abstract-Conference.html
