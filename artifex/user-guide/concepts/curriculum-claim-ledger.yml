  - id: switching-linear-system-mixture-growth
    guide: classical-generative-models.md
    anchor: switching-nonlinear-and-non-gaussian-systems
    maturity: Established
    status: path-marginal-and-approximation-bounded
    claim: >-
      A switching linear dynamical system is linear Gaussian conditional on a
      discrete mode path, while marginalizing mode paths produces a Gaussian
      mixture whose unreduced path-indexed component count grows exponentially;
      generic inference therefore needs mixture reduction, variational,
      particle, or Monte Carlo approximation.
    evidence:
      - url: https://proceedings.mlr.press/v54/linderman17a.html
        version: AISTATS 2017 proceedings
    verified: 2026-07-14

  - id: structural-forecast-not-causal-impact
    guide: classical-generative-models.md
    anchor: structural-probabilistic-time-series-models
    maturity: Established
    status: estimand-and-identification-bounded
    claim: >-
      A structural time-series model can propagate posterior and process
      uncertainty into probabilistic forecasts, but causal-impact claims
      additionally require a defined intervention and counterfactual estimand,
      appropriate unaffected comparison information or structural restrictions,
      stable mechanisms, and supporting diagnostics or sensitivity analysis.
    evidence:
      - url: https://doi.org/10.1214/14-AOAS788
        version: Brodersen et al., Annals of Applied Statistics 9(1), 2015
    verified: 2026-07-14

  - id: gaussian-precision-conditional-independence
    guide: classical-generative-models.md
    anchor: gaussian-graphical-models-zeros-in-the-precision-matrix
    maturity: Established
    status: distribution-family-and-nonsingularity-bounded
    claim: >-
      For a nonsingular multivariate Gaussian law, an off-diagonal precision
      zero is equivalent to conditional independence of the corresponding
      coordinates given every other coordinate; covariance zeros and arbitrary
      non-Gaussian laws do not inherit this equivalence.
    evidence:
      - url: https://doi.org/10.2307/2528966
        version: Dempster, Biometrics 28(1), 1972
    verified: 2026-07-14

  - id: graphical-lasso-selection-boundary
