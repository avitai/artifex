    maturity: Established
    status: estimator-geometry-and-random-path-separated
    claim: >-
      Under matched squared-loss and regularization conventions, kernel ridge
      regression can equal a GP posterior mean without supplying the posterior
      covariance or samples; in the usual non-degenerate infinite-dimensional
      setting, GP draws lie outside their covariance kernel's Cameron-Martin
      RKHS almost surely, with finite-rank processes an important exception.
    evidence:
