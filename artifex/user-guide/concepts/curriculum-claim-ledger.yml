    anchor: bounds-and-reference-copulas
    maturity: Established
    status: dimension-bounded
    claim: >-
      The Frechet-Hoeffding lower envelope is the bivariate countermonotone
      copula but is generally not itself a copula in dimension three or above;
      there is no universal construction making every multivariate coordinate
      pair perfectly countermonotone.
    evidence:
      - url: https://doi.org/10.1214/17-AAP1292
        version: Annals of Applied Probability 2017, multivariate Frechet-Hoeffding bounds
    verified: 2026-07-16

  - id: gaussian-vs-student-tail-boundary
    guide: copula-models-explained.md
    anchor: elliptical-copulas
    maturity: Established
    status: family-parameter-and-limit-bounded
    claim: >-
      A nondegenerate bivariate Gaussian copula has zero lower and upper
