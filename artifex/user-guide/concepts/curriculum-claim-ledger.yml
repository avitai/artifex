  - id: copula-sklar-uniqueness-boundary
    guide: copula-models-explained.md
    anchor: sklars-theorem-with-its-uniqueness-clause
    maturity: Established
    status: marginal-continuity-and-range-bounded
    claim: >-
      Every multivariate CDF admits a copula representation, but the copula is
      unique on the whole unit cube only when every marginal is continuous; for
      discontinuous marginals the observed law fixes it only on the product of
      marginal ranges.
    evidence:
      - url: https://papers.ssrn.com/sol3/papers.cfm?abstract_id=4198458
        version: Sklar 1959 original reproduced with a 2023 English translation
      - url: https://doi.org/10.1017/S0515036100014963
        version: ASTIN Bulletin 2007 discrete copula analysis
    verified: 2026-07-16

  - id: copula-density-factorization-continuity-boundary
    guide: copula-models-explained.md
    anchor: density-factorization
    maturity: Established
    status: absolute-continuity-and-base-measure-bounded
    claim: >-
      The familiar product of a copula density and univariate marginal
      densities is a continuous-density identity; discrete or mixed observed
      likelihoods require CDF differences, integrals, or a declared latent
      observation model rather than pointwise evaluation of that formula.
    evidence:
      - url: https://doi.org/10.1017/S0515036100014963
        version: ASTIN Bulletin 2007 count-data treatment
    verified: 2026-07-14

