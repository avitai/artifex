        version: Friedman, Hastie, and Tibshirani, Biostatistics 9(3), 2008
      - url: https://arxiv.org/abs/0811.3628
        version: Ravikumar et al., Electronic Journal of Statistics 5, 2011
    verified: 2026-07-14

  - id: latent-gaussian-sparse-low-rank-precision
    guide: classical-generative-models.md
    anchor: hidden-variables-turn-sparse-structure-into-dense-dependence
    maturity: Established
    status: decomposition-and-identifiability-bounded
    claim: >-
      Marginalizing Gaussian latent variables subtracts a positive-semidefinite
      low-rank Schur-complement term from the observed sparse concentration
      block, potentially producing dense observed conditional dependence;
      separating the two components requires assumptions that distinguish
