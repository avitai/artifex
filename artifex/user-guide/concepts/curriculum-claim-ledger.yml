      - url: https://papers.nips.cc/paper/2021/hash/dac4a67bdc4a800113b0f1ad67ed696f-Abstract.html
        version: NeurIPS 2021 implicit generative copulas
      - url: https://proceedings.mlr.press/v258/huk25a.html
        version: AISTATS 2025 ratio copula
      - url: https://openreview.net/forum?id=YrX77XRgku
        version: ICLR 2026 diffusion and flow-based copulas
    verified: 2026-07-19

  - id: pcfg-local-normalization-not-global-consistency
    guide: probabilistic-grammars-and-program-derivations.md
    anchor: local-rule-normalization-does-not-prove-global-consistency
    maturity: Established
    status: termination-and-finite-output-bounded
    claim: >-
      Production alternatives can be locally normalized for every nonterminal
      while a recursive PCFG assigns positive mass to infinite derivations; a
      probability law over finite outputs therefore also needs the appropriate
      consistency or termination argument.
    evidence:
      - url: https://doi.org/10.1109/T-C.1973.223746
        version: IEEE Transactions on Computers 1973
      - url: https://doi.org/10.1016/j.mcm.2010.03.046
        version: Mathematical and Computer Modelling 2010
    verified: 2026-07-14

  - id: ambiguous-grammar-likelihood-sums-derivations
    guide: probabilistic-grammars-and-program-derivations.md
    anchor: ambiguity-is-probability-not-parser-noise
    maturity: Established
    status: latent-derivation-marginalization
    claim: >-
      When only a yield or execution result is observed, its probability is
      the sum of the probabilities of every compatible finite derivation; the
      Viterbi derivation is a different query and need not identify the
      maximum-probability observed object.
    evidence:
      - url: https://doi.org/10.1016/0885-2308(90)90022-X
        version: Computer Speech and Language 1990
    verified: 2026-07-14

  - id: grammar-chart-semiring-query-boundary
    guide: probabilistic-grammars-and-program-derivations.md
    anchor: one-recurrence-several-algebras
    maturity: Established
    status: algebra-and-query-bounded
    claim: >-
      A shared chart decomposition can compute recognition, marginal mass,
      Viterbi structure, or sufficient-statistic expectations by changing its
      algebra, but these outputs are not interchangeable probabilistic claims.
    evidence:
      - url: https://aclanthology.org/J99-4004/
        version: Computational Linguistics 1999
    verified: 2026-07-14

  - id: chart-circuit-equivalence-instantiation-boundary
    guide: probabilistic-grammars-and-program-derivations.md
    anchor: packed-forests-and-circuit-compilation
    maturity: Established
    status: finite-query-compilation-bounded
    claim: >-
      The acyclic inside computation for a fixed finite observation can be
      compiled into a sum-product circuit representing the same derivation
      sum; this per-query compilation does not identify the reusable recursive
      grammar with one fixed circuit for arbitrary observations.
    evidence:
      - url: https://aclanthology.org/J99-4004/
        version: Computational Linguistics 1999
    verified: 2026-07-14

  - id: compound-pcfg-conditional-exactness-boundary
    guide: probabilistic-grammars-and-program-derivations.md
    anchor: global-latents-and-conditional-tractability
    maturity: Peer-reviewed research
    status: tree-sum-exact-latent-integral-approximate
    claim: >-
      In a compound PCFG, inside inference exactly sums derivations conditional
      on a fixed global latent and its rule probabilities, while the marginal
      integral over that latent generally remains approximate.
    evidence:
      - url: https://aclanthology.org/P19-1228/
        version: ACL 2019
    verified: 2026-07-14

  - id: grammar-validity-layers-not-equivalent
    guide: probabilistic-grammars-and-program-derivations.md
    anchor: syntax-static-semantics-and-behavior
    maturity: Established
    status: syntax-type-execution-and-behavior-separated
    claim: >-
      Context-free syntactic validity does not by itself establish type
      correctness, terminating execution, satisfaction of a behavioral
      specification, or scientific adequacy; each stronger layer needs its own
      semantics and validation mechanism.
    evidence:
      - url: https://iclr.cc/virtual/2018/poster/32
        version: ICLR 2018 syntax-directed VAE
      - url: https://proceedings.mlr.press/v97/kajino19a.html
        version: ICML 2019 molecular hypergraph grammar
    verified: 2026-07-14

  - id: local-grammar-mask-not-global-conditioning
    guide: probabilistic-grammars-and-program-derivations.md
    anchor: autoregressive-yield-models-plus-formal-constraints
    maturity: Established
    status: support-guarantee-and-target-law-separated
    claim: >-
      Renormalizing an autoregressive conditional over locally viable next
      tokens can guarantee formal-language support under its parser and
      tokenization assumptions, but it generally differs from the base
      sequence law conditioned globally on membership in that language.
    evidence:
      - url: https://aclanthology.org/2023.emnlp-main.674/
        version: EMNLP 2023
    verified: 2026-07-14

  - id: grammar-gflownet-object-multiplicity-boundary
    guide: probabilistic-grammars-and-program-derivations.md
    anchor: grammars-and-gflownets
    maturity: Interpretive synthesis
    status: construction-path-and-terminal-object-bounded
    claim: >-
      A grammar can define a constructive state graph for a GFlowNet, but
      multiple expansion orders or derivations may reach the same terminal
      syntax or semantic object, so reward-proportional object sampling needs
      an explicit treatment of path and equivalence-class multiplicity.
    evidence:
      - url: https://jmlr.org/papers/v24/22-0364.html
        version: JMLR 2023 GFlowNet foundations
    verified: 2026-07-14

  - id: current-grammar-generation-results-protocol-bounded
    guide: probabilistic-grammars-and-program-derivations.md
    anchor: current-research-verified-through-2026-07-19
    maturity: Peer-reviewed research
    status: grammar-task-representation-and-solver-bounded
    claim: >-
      Current neural grammar, molecular grammar, constrained-decoding, and
      arbitrary-order generation results expand the available compositions,
      but do not establish universal grammar induction, semantic correctness,
      cheap constraint enforcement, or preservation of an unconstrained target
      law across models and tasks.
    evidence:
      - url: https://proceedings.mlr.press/v267/sun25aa.html
        version: ICML 2025
      - url: https://aclanthology.org/2025.findings-acl.177/
        version: Findings of ACL 2025
      - url: https://openreview.net/forum?id=7Sph4KyeYO
        version: ICLR 2026
    verified: 2026-07-19

  - id: born-probability-nonnegative-but-parameters-nonidentified
    guide: tensor-network-and-born-probability-models.md
    anchor: internal-cancellation-is-not-negative-probability
    maturity: Established
    status: probability-and-parameter-semantics-separated
    claim: >-
      Squaring a real or complex tensor-network amplitude produces nonnegative
      probabilities after normalization, while phase, sign, gauge, and some
      internal cancellations remain unidentifiable from basis probabilities.
    evidence:
      - url: https://doi.org/10.1103/PhysRevX.8.031012
        version: Physical Review X 2018
    verified: 2026-07-14

  - id: mps-rank-and-order-control-capacity
    guide: tensor-network-and-born-probability-models.md
    anchor: variable-order-is-part-of-the-model
    maturity: Established
    status: fixed-order-unfolding-rank-bounded
    claim: >-
      For a fixed variable order, MPS bond ranks control ranks of successive
      unfoldings; permuting variables can change the rank required to represent
      the same probability table or amplitude.
    evidence:
      - url: https://proceedings.neurips.cc/paper_files/paper/2019/hash/b86e8d03fe992d1b0e19656875ee557c-Abstract.html
        version: NeurIPS 2019
    verified: 2026-07-14

  - id: mps-exact-queries-structure-bounded
    guide: tensor-network-and-born-probability-models.md
    anchor: general-contraction-graphs
    maturity: Established
    status: topology-rank-query-and-contraction-order-bounded
    claim: >-
      Chain-structured MPS models support polynomial-time normalization,
      marginalization, conditioning, and sequential sampling at bounded rank,
      but tensor-network tractability does not transfer to arbitrary topologies,
      ranks, contraction orders, or queries.
    evidence:
      - url: https://www.jmlr.org/papers/v22/18-431.html
        version: JMLR 2021
      - url: https://proceedings.mlr.press/v161/novikov21a.html
        version: UAI 2021
    verified: 2026-07-14

  - id: tensor-circuit-relationship-structural
    guide: tensor-network-and-born-probability-models.md
    anchor: probabilistic-circuits
    maturity: Peer-reviewed research
    status: factorization-property-and-query-bounded
    claim: >-
      A fixed tensor contraction can be expressed as a sum-product circuit and
      many tensor factorizations admit circuit representations, but efficient
      probabilistic queries still depend on nonnegativity or squaring and on
      the circuit's scope, decomposability, smoothness, and orthogonality
      properties.
    evidence:
      - url: https://openreview.net/forum?id=Y7dRmpGiHj
        version: TMLR 2025
      - url: https://openreview.net/forum?id=gHPRSPxIsk
        version: ICLR 2026
    verified: 2026-07-14

  - id: classical-born-model-not-quantum-advantage
    guide: tensor-network-and-born-probability-models.md
    anchor: born-machines-and-quantum-generative-models
    maturity: Established
    status: probability-semantics-and-computational-substrate-separated
    claim: >-
      A classically stored and contracted Born MPS uses the same squared-amplitude
      probability rule as a quantum-state measurement without requiring quantum
      hardware; a quantum computational advantage needs a task, accuracy,
      resource model, classical baseline, and hardware evidence.
    evidence:
      - url: https://doi.org/10.1103/PhysRevX.8.031012
        version: Physical Review X 2018 classical MPS Born machine
    verified: 2026-07-14

  - id: continuous-born-gram-measure-boundary
    guide: tensor-network-and-born-probability-models.md
    anchor: continuous-variables-through-feature-maps
    maturity: Peer-reviewed research
    status: feature-map-base-measure-and-rank-bounded
    claim: >-
      Continuous MPS densities require a declared base measure and feature-map
      Gram contractions; replacing a nonidentity Gram matrix by the identity
      changes normalization, while universal approximation does not imply a
      fixed-rank or fixed-feature performance guarantee.
    evidence:
      - url: https://doi.org/10.21468/SciPostPhys.18.3.096
        version: SciPost Physics 2025
    verified: 2026-07-14

  - id: current-tensor-born-results-protocol-bounded
    guide: tensor-network-and-born-probability-models.md
    anchor: research-checkpoints
    maturity: Peer-reviewed research
    status: structure-rank-query-data-and-systems-bounded
    claim: >-
      Current tensorized-circuit, continuous Born, and orthogonal squared-circuit
      results broaden the family's representations and exact-query mechanisms,
      but do not establish one universally efficient rank, order, contraction,
      optimizer, sampler, or computational advantage across tasks.
    evidence:
      - url: https://openreview.net/forum?id=Y7dRmpGiHj
        version: TMLR 2025
      - url: https://doi.org/10.21468/SciPostPhys.18.3.096
        version: SciPost Physics 2025
      - url: https://openreview.net/forum?id=gHPRSPxIsk
        version: ICLR 2026
    verified: 2026-07-14

  - id: beta-bernoulli-observation-semantics-boundary
    guide: bayesian-learning-and-model-assessment.md
    anchor: ordered-sequence-evidence-is-not-count-evidence
    maturity: Established
    status: posterior-sufficiency-and-evidence-semantics-separated
    claim: >-
      A Bernoulli sequence and its success count have the same parameter
      posterior once the count is sufficient, but their marginal
      probabilities differ by the binomial multiplicity because they are
      different recorded observations.
    evidence:
      - url: https://doi.org/10.1214/aos/1176344611
        version: Annals of Statistics 1979 conjugate exponential-family analysis
    verified: 2026-07-14

  - id: conjugate-mean-parameter-boundary
    guide: bayesian-learning-and-model-assessment.md
    anchor: the-conjugate-exponential-family-calculation
    maturity: Established
    status: natural-and-mean-parameter-expectations-separated
    claim: >-
      Under the properness and boundary conditions for the natural conjugate
      prior, tau over nu gives the expectation of the exponential-family mean
      parameter, not generally the expectation of its natural parameter.
    evidence:
      - url: https://doi.org/10.1214/aos/1176344611
        version: Annals of Statistics 1979
    verified: 2026-07-14

  - id: covariance-scale-correlation-boundary
    guide: bayesian-learning-and-model-assessment.md
    anchor: multivariate-priors-should-expose-scale-and-dependence
    maturity: Established
    status: covariance-correlation-and-cholesky-measures-separated
    claim: >-
      Decomposing covariance into marginal scales and a correlation matrix
      separates modeling choices; the LKJ matrix density is not the Cholesky
      factor density, whose transformed measure requires its own Jacobian and
      diagonal powers.
    evidence:
      - url: https://doi.org/10.1016/j.jmva.2009.04.008
        version: Journal of Multivariate Analysis 2009
    verified: 2026-07-14

  - id: finite-exchangeability-extendibility-boundary
    guide: bayesian-learning-and-model-assessment.md
    anchor: exchangeability-and-mixture-representations
    maturity: Established
    status: finite-symmetry-and-infinite-mixture-representation-separated
    claim: >-
      Permutation invariance of one finite sequence does not by itself imply an
      exact mixture-of-IID representation; the classical de Finetti conclusion
      requires infinite exchangeability or the relevant extendibility
      assumptions.
    evidence:
      - url: https://doi.org/10.1214/aop/1176994663
        version: Annals of Probability 1980
    verified: 2026-07-14

  - id: hierarchical-prediction-and-parameterization-boundary
    guide: bayesian-learning-and-model-assessment.md
    anchor: existing-group-and-new-group-prediction-differ
    maturity: Established
    status: group-target-and-computational-geometry-bounded
    claim: >-
      Prediction for an observed group integrates its learned group state,
      whereas prediction for a new exchangeable group integrates a newly drawn
      state; centered and noncentered forms can preserve the model while
      changing posterior computation, with no universally dominant form.
    evidence:
      - url: https://doi.org/10.1214/088342307000000014
        version: Statistical Science 2007
    verified: 2026-07-14

  - id: evidence-and-predictive-comparison-boundary
    guide: bayesian-learning-and-model-assessment.md
    anchor: 5-evidence-prediction-and-model-comparison
    maturity: Established
    status: prior-predictive-held-out-and-stacking-targets-separated
    claim: >-
      Marginal likelihood scores the observed data under a complete prior
      predictive model, leave-one-out criteria target a declared held-out unit,
      and stacking optimizes a predictive mixture; these objectives need not
      rank candidate models identically.
    evidence:
      - url: https://doi.org/10.1007/s11222-016-9696-4
        version: Statistics and Computing 2017
      - url: https://doi.org/10.1214/17-BA1091
        version: Bayesian Analysis 2018
    verified: 2026-07-14

  - id: psis-sample-size-diagnostic-boundary
    guide: bayesian-learning-and-model-assessment.md
    anchor: leave-one-out-predictive-evaluation
    maturity: Peer-reviewed research
    status: finite-draw-tail-diagnostic-bounded
    claim: >-
      The current PSIS warning threshold depends on the number of importance
      draws and is capped at 0.7; an excessive Pareto shape estimate warns
      about finite-sample convergence or bias rather than measuring model fit.
    evidence:
      - url: https://jmlr.org/papers/v25/19-556.html
        version: JMLR 2024
    verified: 2026-07-14

  - id: posterior-predictive-calibration-boundary
    guide: bayesian-learning-and-model-assessment.md
    anchor: posterior-predictive-checks
    maturity: Established
    status: targeted-criticism-and-null-calibration-separated
    claim: >-
      Posterior predictive checks can expose failure for a chosen discrepancy,
      but their tail probabilities are generally not uniform classical null
      p-values and successful checks cannot establish global model correctness.
    evidence:
      - url: https://doi.org/10.1214/ss/1032280214
        version: Statistical Science 1996
    verified: 2026-07-14

  - id: missingness-ignorability-boundary
    guide: bayesian-learning-and-model-assessment.md
    anchor: ignorability-requires-more-than-mar
    maturity: Established
    status: mar-parameter-distinctness-and-query-bounded
    claim: >-
      MAR alone does not make a missingness process universally ignorable;
      likelihood or Bayesian omission also requires the relevant parameter
      distinctness and prior separation, and MAR versus MNAR is generally not
      identified from observed data alone.
    evidence:
      - url: https://doi.org/10.1093/biomet/63.3.581
        version: Biometrika 1976
    verified: 2026-07-14

  - id: dag-local-normalization-boundary
    guide: graphical-models-and-structured-probability.md
    anchor: a-graph-is-structure-the-conditionals-define-the-law
    maturity: Established
    status: graph-structure-kernels-and-normalization-separated
    claim: >-
      A DAG becomes a normalized generative law only after every vertex is
      assigned a locally normalized conditional kernel; acyclicity then permits
      reverse-topological marginalization and ancestral sampling, whereas arrows
      combined with arbitrary nonnegative scores do not supply that proof.
    evidence:
      - url: https://doi.org/10.1002/net.3230200503
        version: Networks 1990 directed factorization and Markov properties
    verified: 2026-07-14

  - id: d-separation-collider-boundary
    guide: graphical-models-and-structured-probability.md
    anchor: active-and-blocked-trails
    maturity: Established
    status: graph-separation-and-distributional-independence-separated
    claim: >-
      D-separation is sound and complete for conditional independences entailed
      by a DAG: conditioning blocks noncolliders but can activate a collider or
      its ancestor trail, so deleting conditioned vertices is not a generally
      valid separation procedure.
    evidence:
      - url: https://doi.org/10.1002/net.3230200504
        version: Networks 1990 d-separation soundness and completeness
    verified: 2026-07-14

  - id: markov-equivalence-causal-boundary
    guide: graphical-models-and-structured-probability.md
    anchor: markov-equivalence
    maturity: Established
    status: observational-independence-class-and-causal-orientation-separated
    claim: >-
      Two DAGs encode the same conditional-independence model exactly when they
      share a skeleton and unshielded colliders, so observational independence
      information generally identifies an equivalence class rather than a
      unique causal orientation.
    evidence:
      - url: https://dl.acm.org/doi/10.5555/647233.719736
        version: UAI 1990 Markov-equivalence characterization
    verified: 2026-07-14

  - id: hammersley-clifford-positivity-boundary
    guide: graphical-models-and-structured-probability.md
    anchor: hammersley-clifford-and-the-support-boundary
    maturity: Established
    status: positive-law-equivalence-and-hard-support-separated
    claim: >-
      For a strictly positive finite law, the undirected global Markov property
      and clique factorization are equivalent; zero-probability constraints
      invalidate a silent use of the converse and must be represented through
      the declared support or explicit zero-valued factors.
    evidence:
      - url: https://doi.org/10.1111/j.2517-6161.1974.tb00999.x
        version: JRSS B 1974 positive Markov fields and Gibbs representations
    verified: 2026-07-14

  - id: energy-gauge-mode-sample-boundary
    guide: graphical-models-and-structured-probability.md
    anchor: energy-is-a-parameterization-not-a-probability
    maturity: Established
    status: energy-gauge-probability-mode-and-typicality-separated
    claim: >-
      Energy values need not be positive and are identifiable only up to an
      additive constant after normalization; energy differences determine
      probability ratios, while a minimum-energy mode is not generally a
      representative sample or a typical high-dimensional configuration.
    evidence:
      - url: https://doi.org/10.1561/2200000001
        version: Foundations and Trends 2008 exponential-family and graphical-model normalization
    verified: 2026-07-14

  - id: graphical-pseudolikelihood-boundary
    guide: graphical-models-and-structured-probability.md
    anchor: pseudolikelihood-is-a-composite-objective
    maturity: Established
    status: composite-objective-joint-likelihood-and-calibration-separated
    claim: >-
      A product of normalized nodewise full conditionals is generally neither
      the joint probability nor normalized over complete configurations;
      consistency and sandwich-covariance calibration require model,
      identifiability, support, sampling, and regularity conditions rather than
      following from local normalization alone.
    evidence:
      - url: https://doi.org/10.2307/2987782
        version: Statistician 1975 pseudolikelihood construction
      - url: https://www3.stat.sinica.edu.tw/statistica/J21N1/J21N11/J21N11.html
        version: Statistica Sinica 2011 composite-likelihood and Godambe-information review
    verified: 2026-07-16

  - id: crf-convexity-parameterization-boundary
    guide: graphical-models-and-structured-probability.md
    anchor: conditional-random-fields
    maturity: Established
    status: log-linear-concavity-and-deep-nonlinear-optimization-separated
    claim: >-
      Conditional log likelihood is concave, equivalently negative conditional
      log likelihood is convex, for a finite log-linear CRF under its declared
      parameterization; replacing the linear score by a deep nonlinear network
      removes that generic convexity guarantee.
    evidence:
      - url: https://repository.upenn.edu/cis_papers/159/
        version: ICML 2001 conditional random fields
    verified: 2026-07-14

  - id: local-global-normalization-boundary
    guide: graphical-models-and-structured-probability.md
    anchor: local-and-global-normalization
    maturity: Established
    status: normalization-scope-context-and-label-bias-separated
    claim: >-
      Local versus global normalization is a distinction about where competing
      paths are normalized, not about whether the network sees future input;
      history-dependent shifts discarded by local softmaxes can create label
      bias on constrained state graphs even with complete input context.
    evidence:
      - url: https://repository.upenn.edu/cis_papers/159/
        version: ICML 2001 CRF and label-bias comparison
      - url: https://aclanthology.org/P16-1231/
        version: ACL 2016 local versus global normalization
    verified: 2026-07-14

  - id: graphical-conversion-preservation-boundary
    guide: graphical-models-and-structured-probability.md
    anchor: four-preservation-questions
    maturity: Established
    status: law-independence-query-and-computation-preservation-separated
    claim: >-
      Converting among DAGs, MRFs, factor graphs, junction trees, and circuits
      must state separately whether it preserves the represented law, the full
      independence model, a selected query, and computational tractability;
      none of these preservation properties implies all the others.
    evidence:
      - url: https://doi.org/10.1109/18.910572
        version: IEEE Transactions on Information Theory 2001 factor graphs and sum-product
      - url: https://doi.org/10.1002/net.3230200503
        version: Networks 1990 directed Markov properties
    verified: 2026-07-14

  - id: mixed-graph-semantics-boundary
    guide: graphical-models-and-structured-probability.md
    anchor: chain-graphs-need-a-markov-convention
    maturity: Established
    status: edge-picture-and-markov-convention-separated
    claim: >-
      A chain or mixed-edge drawing does not determine a unique probability
      semantics: the chain components, their conditional factorization, and a
      named Markov or separation convention are required, and different
      conventions can encode different independence models for one picture.
    evidence:
      - url: https://www.jstor.org/stable/4616151
        version: Scandinavian Journal of Statistics 1990 LWF chain graphs
    verified: 2026-07-14

  - id: admg-latent-projection-boundary
    guide: graphical-models-and-structured-probability.md
    anchor: latent-projection-and-admgs
    maturity: Established
    status: marginal-independence-summary-and-latent-mechanism-separated
    claim: >-
      An ADMG latent projection summarizes directed and latent-confounding paths
      among observed variables and supports m-separation, but a bidirected edge
      does not identify the number or state space of latent causes, a unique
      structural equation model, or an individual counterfactual coupling.
    evidence:
      - url: https://doi.org/10.1111/1467-9469.00323
        version: Scandinavian Journal of Statistics 2003 ADMG Markov properties
    verified: 2026-07-14

  - id: sutva-exogenous-independence-boundary
    guide: causal-generative-models-explained.md
    anchor: potential-outcomes-and-the-consistency-bridge
    maturity: Established
    status: treatment-version-interference-and-exogenous-dependence-separated
    claim: >-
      SUTVA concerns consistency under well-defined treatment versions and the
      absence of prohibited interference; it is not the assumption that SCM
      exogenous variables are mutually independent, which is a different
      restriction on latent confounding and counterfactual dependence.
    evidence:
      - url: https://doi.org/10.2307/2287653
        version: JASA 1980 potential outcomes and SUTVA
      - url: https://doi.org/10.1515/jci-2012-0002
        version: Journal of Causal Inference 2013 multiple treatment versions
    verified: 2026-07-14

  - id: inla-structural-scope-boundary
    guide: graphical-inference-and-message-passing.md
    anchor: integrated-nested-laplace-approximation-structure-specific-deterministic-inference
    maturity: Established
    status: latent-gaussian-sparse-low-hyperparameter-scope-bounded
    claim: >-
      INLA is a nested deterministic approximation for posterior marginals in
      latent Gaussian models, exploiting sparse precision and numerical
      integration over relatively few hyperparameters; it is not a universal
      global-accuracy or global-mode guarantee for arbitrary graphical models.
    evidence:
      - url: https://doi.org/10.1111/j.1467-9868.2008.00700.x
        version: JRSS B 2009 integrated nested Laplace approximation
    verified: 2026-07-14

  - id: differential-entropy-reference-measure-boundary
    guide: information-coding-and-generative-modeling.md
    anchor: continuous-variables-require-a-reference-measure
    maturity: Established
    status: continuous-density-coordinate-and-operational-code-separated
    claim: >-
      Differential entropy depends on coordinates and reference measure and can
      be negative; a continuous log density becomes an operational codelength
      only after a quantization or discrete observation protocol supplies the
      resolution term, whereas KL under a shared invertible transformation is
      invariant when it is well defined.
    evidence:
      - url: https://onlinelibrary.wiley.com/doi/abs/10.1002/j.1538-7305.1948.tb00917.x
        version: Bell System Technical Journal 1948
    verified: 2026-07-15

  - id: typicality-mode-boundary
    guide: information-coding-and-generative-modeling.md
    anchor: typical-sequences-are-not-modal-sequences
    maturity: Established
    status: pointwise-mode-and-probability-mass-shell-separated
    claim: >-
      Under the AEP assumptions, typical sequences have per-symbol information
      near the entropy and collectively carry probability approaching one; a
      pointwise mode need not lie in that set, so maximum density and
      representative high-dimensional mass are different queries.
    evidence:
      - url: https://onlinelibrary.wiley.com/doi/abs/10.1002/j.1538-7305.1948.tb00917.x
        version: Bell System Technical Journal 1948
    verified: 2026-07-15

  - id: deterministic-continuous-mutual-information-boundary
    guide: information-coding-and-generative-modeling.md
    anchor: deterministic-continuous-networks-expose-a-boundary
    maturity: Peer-reviewed research
    status: deterministic-map-singularity-and-estimator-proxy-separated
    claim: >-
      For an absolutely continuous input and a nontrivial deterministic neural
      representation, input-representation mutual information is commonly
      infinite because the joint is singular relative to the product law;
      binning or adding noise changes the random variable and cannot silently
      be reported as the original network's information compression.
    evidence:
      - url: https://arxiv.org/abs/1802.09766
        version: IEEE TPAMI 2020 author manuscript
      - url: https://arxiv.org/abs/1810.05728
        version: ICML 2019 full author manuscript
    verified: 2026-07-15

  - id: neural-mutual-information-estimation-boundary
    guide: information-coding-and-generative-modeling.md
    anchor: estimation-is-harder-than-writing-the-definition
    maturity: Peer-reviewed research
    status: functional-bound-estimator-and-optimized-value-separated
    claim: >-
      Variational mutual-information objectives exhibit estimator-specific
      bias-variance and saturation behavior, and without distributional
      assumptions an IID-sample high-confidence lower bound cannot generally
      certify information substantially beyond logarithmic order in sample
      count; an optimized critic value is therefore not automatically an
      accurate MI measurement.
    evidence:
      - url: https://proceedings.mlr.press/v97/poole19a.html
        version: ICML 2019
      - url: https://proceedings.mlr.press/v108/mcallester20a.html
        version: AISTATS 2020
    verified: 2026-07-15

  - id: source-coding-operational-boundary
    guide: information-coding-and-generative-modeling.md
    anchor: the-source-coding-theorem-is-asymptotic-and-source-specific
    maturity: Established
    status: entropy-rate-code-regime-and-finite-file-separated
    claim: >-
      Entropy or entropy rate bounds expected lossless description length only
      under a declared source and code regime; block size, stationarity,
      ergodicity, error, delay, shared context, and overhead prevent an entropy
      number from being identified with every individual file length.
    evidence:
      - url: https://onlinelibrary.wiley.com/doi/abs/10.1002/j.1538-7305.1948.tb00917.x
        version: Bell System Technical Journal 1948
    verified: 2026-07-15

  - id: generative-likelihood-codec-boundary
    guide: information-coding-and-generative-modeling.md
    anchor: actual-size-has-more-terms-than-model-cross-entropy
    maturity: Established
    status: ideal-nll-payload-side-model-and-container-cost-separated
    claim: >-
      A normalized discrete generative model supplies ideal sequential
      codelengths, but a deployable compressor additionally requires identical
      finite probability tables at both endpoints and must count side
      information, model sharing, termination, padding, and container costs.
    evidence:
      - url: https://arxiv.org/abs/1311.2540
        version: Asymmetric Numeral Systems 2013
    verified: 2026-07-15

  - id: rate-distortion-operational-boundary
    guide: information-coding-and-generative-modeling.md
    anchor: lossy-coding-begins-with-what-may-be-forgotten
    maturity: Established
    status: asymptotic-information-limit-and-neural-objective-separated
    claim: >-
      Shannon's rate-distortion function is an asymptotic infimum over
      reconstruction channels for a declared source and distortion; it is not
      the training loss, token count, or measured rate of one finite neural
      codec, and changing the distortion changes the operational problem.
    evidence:
      - url: https://ieeexplore.ieee.org/document/5311476
        version: IRE Convention Record 1959
    verified: 2026-07-15

  - id: generative-compression-fidelity-boundary
    guide: information-coding-and-generative-modeling.md
    anchor: distortion-perception-and-hallucination
    maturity: Peer-reviewed research
    status: distributional-realism-and-instance-fidelity-separated
    claim: >-
      A generative decoder may improve distributional perceptual realism by
      sampling details absent from the bitstream, but that does not establish
      fidelity to the particular source; rate, source distortion, realism,
      task error, stochastic variation, and decoder compute require separate
      measurement.
    evidence:
      - url: https://proceedings.mlr.press/v97/blau19a.html
        version: ICML 2019
      - url: https://proceedings.mlr.press/v267/ohayon25a.html
        version: ICML 2025
    verified: 2026-07-15

  - id: channel-capacity-finite-blocklength-boundary
    guide: information-coding-and-generative-modeling.md
    anchor: asymptotic-capacity-does-not-predict-one-finite-system
    maturity: Peer-reviewed research
    status: asymptotic-capacity-and-finite-code-performance-separated
    claim: >-
      Channel capacity is an optimized asymptotic rate under a declared channel
      and input constraint; it does not determine performance at one finite
      blocklength, error probability, latency, or decoder, for which separate
      achievability and converse bounds apply.
    evidence:
      - url: https://doi.org/10.1109/TIT.2010.2043769
        version: IEEE Transactions on Information Theory 2010
    verified: 2026-07-15

  - id: generative-denoising-channel-coding-boundary
    guide: information-coding-and-generative-modeling.md
    anchor: generative-denoising-is-bayesian-decodingbut-not-always-channel-coding
    maturity: Established
    status: posterior-denoising-and-operational-communication-separated
    claim: >-
      Posterior denoising under a corruption likelihood has the same Bayesian
      form as channel decoding, but it is channel coding only when a message,
      encoder, operational channel, rate, decoder, and error criterion are
      present; a training corruption process alone supplies none of these.
    evidence:
      - url: https://onlinelibrary.wiley.com/doi/abs/10.1002/j.1538-7305.1948.tb00917.x
        version: Bell System Technical Journal 1948
    verified: 2026-07-15

  - id: information-bottleneck-determinism-boundary
    guide: information-coding-and-generative-modeling.md
    anchor: determinism-creates-degenerate-or-singular-objectives
    maturity: Peer-reviewed research
    status: exact-functional-variational-surrogate-and-task-minimality-separated
    claim: >-
      Information-bottleneck minimality is relative to a relevance variable
      and encoder family; deterministic continuous maps can make the exact
      compression term infinite or degenerate, and a variational KL surrogate
      does not prove that the exact bottleneck curve or a universally minimal
      representation was recovered.
    evidence:
      - url: https://arxiv.org/abs/physics/0004057
        version: Allerton 1999 manuscript
      - url: https://arxiv.org/abs/1808.07593
        version: ICLR 2019 author manuscript
    verified: 2026-07-15

  - id: description-length-algorithmic-information-boundary
    guide: information-coding-and-generative-modeling.md
    anchor: algorithmic-information-is-a-limit-concept-not-a-measured-neural-score
    maturity: Established
    status: mdl-code-bayesian-evidence-compressor-bound-and-kolmogorov-complexity-separated
    claim: >-
      MDL requires a specified model and data code, Bayesian evidence requires
      a specified prior, and a practical compressor supplies only a computable
      upper bound on machine-dependent Kolmogorov complexity, which is itself
      uncomputable; these quantities are not interchangeable complexity scores.
    evidence:
      - url: https://doi.org/10.1016/0005-1098(78)90005-5
        version: Automatica 1978
      - url: https://www.mathnet.ru/php/archive.phtml?jrnid=ppi&option_lang=eng&paperid=68&wshow=paper
        version: Problems of Information Transmission 1965
    verified: 2026-07-15

  - id: autodiff-derivative-program-boundary
    guide: optimization-and-learning-dynamics.md
    anchor: detachment-changes-the-derivative-program
    maturity: Established
    status: forward-value-derivative-transform-and-optimizer-separated
    claim: >-
      Automatic differentiation applies the chain rule to a numerical program;
      a stop-gradient or custom VJP can preserve the forward value while changing
      its derivative, and an optimizer is a separate stateful map from supplied
      derivatives to updates.
    evidence:
      - url: https://www.jmlr.org/papers/v18/17-468.html
        version: JMLR 2018 automatic differentiation survey
    verified: 2026-07-15

  - id: stochastic-gradient-estimator-boundary
    guide: optimization-and-learning-dynamics.md
    anchor: the-central-problem
    maturity: Established
    status: expectation-derivative-interchange-and-monte-carlo-estimator-separated
    claim: >-
      Differentiating an expectation requires regularity that permits exchanging
      derivative and integral; pathwise and score-function estimators are
      different representations of the resulting derivative with separate
      support, differentiability, bias, variance, and cost contracts.
    evidence:
      - url: https://www.jmlr.org/papers/v21/19-346.html
        version: JMLR 2020 Monte Carlo gradient estimation
      - url: https://proceedings.neurips.cc/paper_files/paper/2015/file/de03beffeed9da5f3639a621bcab5dd4-Paper.pdf
        version: NeurIPS 2015 stochastic computation graphs
    verified: 2026-07-15

  - id: discrete-gradient-surrogate-boundary
    guide: optimization-and-learning-dynamics.md
    anchor: worked-discrete-estimator-unbiased-score-biased-straight-through
    maturity: Peer-reviewed research
    status: discrete-target-relaxed-objective-and-surrogate-derivative-separated
    claim: >-
      A finite-temperature Concrete or Gumbel-Softmax pathwise estimator targets
      a relaxed objective, while a hard-forward soft- or identity-backward
      straight-through rule generally supplies a biased surrogate derivative;
      neither is the exact discrete gradient without an additional proof.
    evidence:
      - url: https://openreview.net/forum?id=rkE3y85ee
        version: ICLR 2017 Gumbel-Softmax
      - url: https://openreview.net/forum?id=S1jE5L5gl
        version: ICLR 2017 Concrete distribution
      - url: https://proceedings.neurips.cc/paper/2017/hash/ebd6d2f5d60ff9afaeda1a81fc53e2d0-Abstract.html
        version: NeurIPS 2017 REBAR
    verified: 2026-07-15

  - id: natural-gradient-geometry-boundary
    guide: optimization-and-learning-dynamics.md
    anchor: geometry-from-a-local-distributional-constraint
    maturity: Established
    status: exact-fisher-geometry-singularity-and-practical-approximation-separated
    claim: >-
      Fisher information is positive semidefinite and can be singular under
      redundancy or non-identifiability; exact infinitesimal natural-gradient
      invariance does not transfer unchanged to damping, finite steps, block
      approximations, or excluded parameter groups.
    evidence:
      - url: https://proceedings.neurips.cc/paper/1997/file/ff49cc40a8890e6a60f40ff3026d2730-Paper.pdf
        version: NeurIPS 1997 natural-gradient efficiency
      - url: https://jmlr.org/papers/v21/17-678.html
        version: JMLR 2020 natural-gradient analysis
    verified: 2026-07-15

  - id: empirical-fisher-curvature-boundary
    guide: optimization-and-learning-dynamics.md
    anchor: fisher-generalized-gaussnewton-hessian-and-empirical-fisher
    maturity: Peer-reviewed research
    status: model-fisher-observed-score-outer-product-and-hessian-separated
    claim: >-
      The empirical Fisher formed from observed-label score outer products is
      generally neither the model Fisher nor generic second-order curvature;
      Fisher, generalized Gauss-Newton, and Hessian identities require specific
      likelihood and loss conditions.
    evidence:
      - url: https://arxiv.org/abs/1905.12558
        version: NeurIPS 2019 empirical-Fisher analysis
      - url: https://jmlr.org/papers/v21/17-678.html
        version: JMLR 2020
    verified: 2026-07-15

  - id: adversarial-game-dynamics-boundary
    guide: optimization-and-learning-dynamics.md
    anchor: two-player-objectives-are-not-scalar-minimization
    maturity: Peer-reviewed research
    status: population-equilibrium-vector-field-and-finite-update-separated
    claim: >-
      A GAN population equilibrium does not imply convergence of simultaneous or
      alternating finite neural updates; even a bilinear zero-sum game rotates
      under its continuous field and diverges under simultaneous Euler updates,
      while regularized local convergence needs explicit support and Jacobian
      assumptions.
    evidence:
      - url: https://proceedings.mlr.press/v80/mescheder18a.html
        version: ICML 2018 GAN convergence analysis
    verified: 2026-07-15

  - id: em-monotonicity-stationarity-boundary
    guide: optimization-and-learning-dynamics.md
    anchor: why-exact-em-is-monotone
    maturity: Established
    status: likelihood-monotonicity-stationarity-and-local-maximum-separated
    claim: >-
      Exact EM makes a latent free-energy bound tight and then raises it, which
      yields nondecreasing observed likelihood under its conditions; this alone
      does not imply convergence to a local maximum, and stronger stationarity or
      uniqueness conclusions require additional regularity.
    evidence:
      - url: https://rss.onlinelibrary.wiley.com/doi/abs/10.1111/j.2517-6161.1977.tb01600.x
        version: JRSS B 1977 EM algorithm
      - url: https://doi.org/10.1214/aos/1176346060
        version: Annals of Statistics 1983 convergence analysis
    verified: 2026-07-15

  - id: variational-monte-carlo-em-boundary
    guide: optimization-and-learning-dynamics.md
    anchor: generalized-variational-stochastic-and-monte-carlo-em
    maturity: Established
    status: exact-likelihood-elbo-and-noisy-surrogate-monotonicity-separated
    claim: >-
      Restricted variational EM monotonically improves its chosen ELBO when its
      coordinate steps succeed, not necessarily observed likelihood; Monte Carlo
      and stochastic-approximation variants need accuracy, step-size, and
      stability conditions rather than inheriting exact-EM monotonicity for free.
    evidence:
      - url: https://www.cs.toronto.edu/~hinton/absps/em.htm
        version: Learning in Graphical Models 1998 free-energy view
      - url: https://doi.org/10.1214/aos/1018031103
        version: Annals of Statistics 1999 stochastic-approximation EM
    verified: 2026-07-15

  - id: search-distribution-generator-boundary
    guide: optimization-and-learning-dynamics.md
    anchor: when-the-objective-is-a-query-only-function
    maturity: Established
    status: base-generator-search-law-and-returned-selection-separated
    claim: >-
      An EDA, cross-entropy method, evolution strategy, or Bayesian-optimization
      surrogate allocates black-box evaluations; it is not automatically the
      learned data generator, and elite fitting targets a changing selected set
      rather than a fixed reward-proportional terminal law.
    evidence:
      - url: https://doi.org/10.1023/A:1010091220143
        version: Methodology and Computing in Applied Probability 1999 cross-entropy method
      - url: https://doi.org/10.1162/106365601750190398
        version: Evolutionary Computation 2001 CMA-ES
    verified: 2026-07-15

  - id: submodular-selection-guarantee-boundary
    guide: optimization-and-learning-dynamics.md
    anchor: submodular-selection
    maturity: Established
    status: surrogate-set-function-approximation-and-downstream-utility-separated
    claim: >-
      The classical greedy one-minus-one-over-e guarantee requires a normalized
      monotone submodular function and a cardinality constraint; it guarantees
      the declared surrogate set value, not downstream generative quality or
      scientific utility.
    evidence:
      - url: https://doi.org/10.1007/BF01588971
        version: Mathematical Programming 1978
    verified: 2026-07-15

  - id: monge-kantorovich-transport-boundary
    guide: optimization-and-learning-dynamics.md
    anchor: transport-begins-with-a-cost-and-two-marginals
    maturity: Established
    status: deterministic-map-coupling-and-density-transform-separated
    claim: >-
      A Monge map is a deterministic pushforward and may not exist when source
      atoms must split, whereas a Kantorovich coupling can split mass; when a
      differentiable bijection does define the pushforward, its forward density
      identity is q(T(x)) times the absolute Jacobian determinant equals p(x).
    evidence:
      - url: https://doi.org/10.1007/s002110050002
        version: Numerische Mathematik 2000 dynamic transport
    verified: 2026-07-15

  - id: wasserstein-sinkhorn-boundary
    guide: optimization-and-learning-dynamics.md
    anchor: entropic-regularization
    maturity: Peer-reviewed research
    status: wasserstein-entropic-cost-and-debiased-divergence-separated
    claim: >-
      Wasserstein-p requires p at least one and finite pth moments for a finite
      metric value; entropic regularization changes the coupling objective and
      generally introduces nonzero self-cost, while Sinkhorn divergence removes
      that bias under its construction and retains regularization-dependent
      statistical and numerical trade-offs.
    evidence:
      - url: https://proceedings.neurips.cc/paper_files/paper/2013/hash/af21d0c97db2e27e13572cbf59eb343d-Abstract.html
        version: NeurIPS 2013 entropic transport
      - url: https://proceedings.mlr.press/v89/feydy19a.html
        version: AISTATS 2019 Sinkhorn divergences
      - url: https://proceedings.mlr.press/v89/genevay19a.html
        version: AISTATS 2019 sample complexity
    verified: 2026-07-15

  - id: gradient-object-typing-boundary
    guide: gradients-and-geometry-in-generative-modeling.md
    anchor: the-five-field-gradient-contract
    maturity: Interpretive synthesis
    status: objective-variable-law-geometry-and-estimator-separated
    claim: >-
      A generative gradient is executable only after its objective,
      differentiation variable, averaging law, geometry, and estimator or
      solver are declared; parameter, state, game, implicit, functional,
      natural, and search gradients generally inhabit different vector spaces.
    evidence:
      - url: https://www.jmlr.org/papers/v21/19-346.html
        version: JMLR 2020 Monte Carlo parameter-gradient taxonomy
      - url: https://jmlr.org/papers/v21/17-678.html
        version: JMLR 2020 natural-gradient geometry
      - url: https://proceedings.neurips.cc/paper/2016/hash/b3ba8f1bee1238a2f37603d90b58898d-Abstract.html
        version: NeurIPS 2016 functional particle gradient
    verified: 2026-07-15

  - id: derivative-program-validation-boundary
    guide: gradients-and-geometry-in-generative-modeling.md
    anchor: validate-the-derivative-program-before-the-metric
    maturity: Established
    status: implemented-program-derivative-and-scientific-target-separated
    claim: >-
      JVP/VJP adjoint identities and directional Taylor or finite-difference
      checks can validate derivatives of an implemented numerical program, but
      passing them does not prove that the program represents the intended
      population objective, Fisher information, or continuous-time model.
    evidence:
      - url: https://www.jmlr.org/papers/v18/17-468.html
        version: JMLR 2018 automatic differentiation survey
      - url: https://doi.org/10.1137/1.9780898717761
        version: SIAM 2008 Evaluating Derivatives second edition
      - url: https://docs.jax.dev/en/latest/notebooks/autodiff_cookbook.html
        version: JAX automatic differentiation cookbook
    verified: 2026-07-20

  - id: autoregressive-fisher-context-boundary
    guide: gradients-and-geometry-in-generative-modeling.md
    anchor: autoregressive-models-a-conditional-fisher-sum
    maturity: Established
    status: joint-model-and-data-context-curvature-separated
    claim: >-
      Under regular conditional support, autoregressive score increments have
      zero conditional mean and exact cross-time Fisher terms vanish, but shared
      parameters keep the total Fisher dense; teacher-forced data contexts and
      model-sampled contexts define different curvature expectations.
    evidence:
      - url: https://jmlr.org/papers/v21/17-678.html
        version: JMLR 2020 Fisher and conditional-model conventions
    verified: 2026-07-15

  - id: vae-multiple-fisher-boundary
    guide: gradients-and-geometry-in-generative-modeling.md
    anchor: vaes-encoder-and-decoder-geometries-must-be-separated
    maturity: Established
    status: generative-joint-observed-marginal-and-variational-fisher-separated
    claim: >-
      A VAE contains distinct generative-joint, observed-marginal, and
      variational-conditional statistical families; a natural gradient for the
      amortized posterior is not automatically a natural gradient for the data
      model, and shared amortization prevents independent per-record coordinate
      updates in general.
    evidence:
      - url: https://www.jmlr.org/papers/v14/hoffman13a.html
        version: JMLR 2013 conjugate stochastic variational inference
      - url: https://www.jmlr.org/papers/v26/24-0606.html
        version: JMLR 2025 ELBO natural-gradient geometry
    verified: 2026-07-15

  - id: implicit-generator-fisher-singularity-boundary
    guide: gradients-and-geometry-in-generative-modeling.md
    anchor: a-deterministic-generator-can-be-statistically-singular
    maturity: Established
    status: endpoint-fisher-smoothing-and-transport-pullback-separated
    claim: >-
      A deterministic lower-dimensional pushforward can produce mutually
      singular endpoint laws for nearby parameters, so the classical KL-local
      Fisher need not exist; observation smoothing changes the model, while
      Wasserstein or Sinkhorn pullbacks choose different geometries.
    evidence:
      - url: https://proceedings.neurips.cc/paper/2020/hash/122e27d57ae8ecb37f3f1da67abb33cb-Abstract.html
        version: NeurIPS 2020 Sinkhorn pullback for implicit generators
    verified: 2026-07-15

  - id: game-unrolled-implicit-gradient-boundary
    guide: gradients-and-geometry-in-generative-modeling.md
    anchor: game-unrolled-and-implicit-gradients-answer-different-questions
    maturity: Peer-reviewed research
    status: game-field-finite-unrolling-and-best-response-derivative-separated
    claim: >-
      Simultaneous, alternating, and extragradient methods evaluate a game field
      with different finite schedules; differentiating through K inner updates
      gives the derivative of that K-step system, while an implicit best-response
      derivative additionally requires a smooth isolated inner solution and a
      nonsingular inner Hessian.
    evidence:
      - url: https://openreview.net/forum?id=BydrOIcle
        version: ICLR 2017 unrolled GANs
      - url: https://proceedings.mlr.press/v167/grimmer22a.html
        version: ALT 2022 minimax gradient dynamics
    verified: 2026-07-15

  - id: functional-gradient-geometry-boundary
    guide: gradients-and-geometry-in-generative-modeling.md
    anchor: a-functional-derivative-needs-a-geometry
    maturity: Established
    status: first-variation-metric-and-finite-flow-separated
    claim: >-
      A first variation is a differential of a functional and becomes a gradient
      vector only after a metric is chosen; L2, Fisher-Rao, Wasserstein, and RKHS
      geometries can therefore generate different flows, and a finite neural or
      particle discretization is not the exact continuous flow.
    evidence:
      - url: https://proceedings.mlr.press/v162/fan22d.html
        version: ICML 2022 variational Wasserstein gradient flow
      - url: https://proceedings.mlr.press/v235/choi24a.html
        version: ICML 2024 scalable generative Wasserstein flow
    verified: 2026-07-15

  - id: state-score-parameter-gradient-boundary
    guide: gradients-and-geometry-in-generative-modeling.md
    anchor: state-scores-energy-forces-and-guidance
    maturity: Established
    status: sample-space-score-and-training-parameter-derivative-separated
    claim: >-
      A state score differentiates log density with respect to a generated state
      and drives samplers or guidance, whereas training a score network uses a
      parameter gradient of a score-matching objective; the two vectors live in
      different spaces and corrupted-noise targets require their own marginals.
    evidence:
      - url: https://jmlr.org/papers/v6/hyvarinen05a.html
        version: JMLR 2005 score matching
      - url: https://proceedings.neurips.cc/paper/2021/hash/49ad23d1ec9fa4bd8d77d02681df5cfa-Abstract.html
        version: NeurIPS 2021 classifier guidance
    verified: 2026-07-15

  - id: pathwise-transport-estimator-boundary
    guide: gradients-and-geometry-in-generative-modeling.md
    anchor: pathwise-gradients-are-transport-velocities
    maturity: Peer-reviewed research
    status: transport-velocity-estimator-and-distributional-gradient-flow-separated
    claim: >-
      A velocity satisfying the parameter-indexed continuity equation can yield
      an unbiased pathwise estimator under boundary and integrability conditions;
      multiple valid velocities can have different variance, and this estimator
      correspondence does not make the outer learning rule a Wasserstein
      gradient flow of generated data laws.
    evidence:
      - url: https://proceedings.mlr.press/v80/jankowiak18a.html
        version: ICML 2018 pathwise derivatives and transport equation
      - url: https://proceedings.neurips.cc/paper_files/paper/2018/hash/92c8c96e4c37100777c7190b76d28233-Abstract.html
        version: NeurIPS 2018 implicit reparameterization gradients
    verified: 2026-07-20

  - id: svgd-particle-sampling-boundary
    guide: gradients-and-geometry-in-generative-modeling.md
    anchor: stein-variational-gradients-move-an-interacting-particle-system
    maturity: Peer-reviewed research
    status: rkhs-functional-direction-and-finite-independent-sampling-separated
    claim: >-
      SVGD chooses an RKHS vector field with target-score attraction and kernel
      repulsion, but its finite particles interact and are not thereby
      independent exact target samples; kernel, particle count, and step rule
      define the approximation.
    evidence:
      - url: https://proceedings.neurips.cc/paper/2016/hash/b3ba8f1bee1238a2f37603d90b58898d-Abstract.html
        version: NeurIPS 2016 SVGD
    verified: 2026-07-15

  - id: natural-evolution-search-law-boundary
    guide: gradients-and-geometry-in-generative-modeling.md
    anchor: natural-evolution-strategies-move-a-search-law
    maturity: Peer-reviewed research
    status: search-distribution-and-generated-data-law-fisher-separated
    claim: >-
      Natural evolution strategies use the Fisher of a parameterized search
      distribution over candidates; this geometry governs black-box allocation
      and is not the Fisher geometry of the data law produced by a selected
      candidate generator.
    evidence:
      - url: https://www.jmlr.org/papers/v15/wierstra14a.html
        version: JMLR 2014 natural evolution strategies
    verified: 2026-07-15

  - id: stochastic-estimator-target-boundary
    guide: gradients-and-geometry-in-generative-modeling.md
    anchor: one-derivative-several-estimator-families
    maturity: Established
    status: exact-unbiased-relaxed-and-custom-surrogate-derivatives-separated
    claim: >-
      Score-function, pathwise, and weak or measure-valued identities can
      represent the same population parameter derivative under their respective
      regularity and decomposition conditions, while exact marginalization and
      valid control variates preserve that target; finite relaxations and
      straight-through rules generally differentiate a relaxed or custom
      surrogate instead.
    evidence:
