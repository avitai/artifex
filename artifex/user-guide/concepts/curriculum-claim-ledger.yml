schema_version: 2
last_updated: 2026-07-19

evidence_metadata_catalog: curriculum-evidence-metadata.yml
evidence_review_catalog: curriculum-evidence-review.yml
evidence_schema: >-
  Bibliographic identity and resolution status are normalized by URL in the
  metadata catalog. Source-to-claim support, non-support boundaries, source
  role, reviewer, review method, and review date are normalized by claim and URL
  in the review catalog. Pending review records intentionally contain no guessed
  support judgment.

ledger_scope:
  selection_unit: bounded externally checkable claim
  canonical_guide_rule: >-
    A canonical guide is a curriculum Markdown page whose reading_mode is not
    chapter; projected chapter views inherit the claim ownership of that guide.
  selection_policy: >-
    The ledger is selective rather than a sentence-level bibliography. A direct
    entry is required for externally checkable claims with elevated error or
    staleness risk, including theorem or equivalence boundaries, guarantees,
    quantitative results, empirical comparisons, venue or maturity assertions,
    and protocol claims whose qualifiers change the conclusion.
  exclusions:
    - Book-local notation, definitions, navigation, retrieval prompts, and
      explicitly labeled worked examples are not independent evidence claims.
    - Algebraic steps covered by executable finite checks or the equation
      registry are not duplicated unless an assumption or interpretation is at
      scientific risk.
    - A citation used only as further reading does not create a ledger claim.
  exempt_guides:
    - guide: generative-modeling-first-course.md
      coverage_mode: delegated-reference
      exemption_reason: >-
        This page is a book-local introductory synthesis built from worked
        finite examples, retrieval prompts, and comparisons whose scientific
        claim ownership remains with the substantive probability, inference,
        objective, and model-family guides. Any first-course-specific theorem,
        empirical comparison, maturity assertion, or quantitative result would
        end this exemption and require a direct claim entry.
    - guide: generative-models-notation.md
      coverage_mode: delegated-reference
      exemption_reason: >-
        This page is the book-local convention registry. Scientific assertions
        used while explaining a convention remain owned by their substantive
        canonical guides; any page-specific empirical, theorem, or maturity
        assertion would end this exemption and require a direct claim entry.
    - guide: new-families-frontier-evidence.md
      coverage_mode: aggregate-evidence-index
      exemption_reason: >-
        This page aggregates evidence whose scientific claim ownership remains
        with the substantive family guides and admission ledgers. It cannot be
        used as a substitute claim owner; any independent synthesis or status
        assertion reused outside the index must receive its own bounded entry.
  summary:
    canonical_guides: 50
    direct_claim_guides: 47
    exempt_guides: 3
  reviewed_at: 2026-07-17
  reviewer: openai-codex

allowed_maturity_labels:
  - Established
  - Peer-reviewed research
  - Preprint
  - Technical report
  - Vendor claim
  - Interpretive synthesis

claims:
  - id: mixed-law-density-boundary
    guide: probability-and-generative-modeling.md
    anchor: not-every-law-is-discrete-or-continuously-densitized
    maturity: Established
    status: law-reference-measure-and-density-separated
    claim: >-
      A probability law may combine atomic, absolutely continuous, and singular
      components, so neither an ordinary PMF nor a Lebesgue PDF is the universal
      probabilistic object; a density exists only relative to a dominating
      measure and a measurable pushforward law need not have an ambient density.
    evidence:
      - url: https://www.tropp.caltech.edu/notes/Tro24-Probability-Theory-LN.pdf
        version: Probability Theory with Applications lecture notes, laws and pushforwards
      - url: https://doi.org/10.1214/aop/1176993081
        version: Annals of Probability 1985 regular conditional probability foundations
    verified: 2026-07-14

  - id: continuous-conditioning-version-boundary
    guide: probability-and-generative-modeling.md
    anchor: conditioning-on-an-event-and-conditioning-at-a-value
    maturity: Established
    status: positive-event-ratio-and-kernel-separated
    claim: >-
      Conditioning on a positive-probability event uses an event ratio, whereas
      conditioning on a continuous value is represented by a regular
      conditional probability kernel defined only up to conditioning-null sets;
      the latter must not be justified by a zero-over-zero point-probability ratio.
    evidence:
      - url: https://doi.org/10.1214/aop/1176993081
        version: Annals of Probability 1985 existence and version boundaries
    verified: 2026-07-14

  - id: randomized-pit-atomic-boundary
    guide: probability-and-generative-modeling.md
    anchor: probability-integral-transforms-need-an-atom-check
    maturity: Established
    status: direct-transform-and-randomized-transform-separated
    claim: >-
      F(X) is uniform under the usual continuous-CDF condition but generally
      retains atoms for discrete or mixed laws; adding an independent uniform
      randomization between the left and attained CDF values yields the universal
      univariate transform, while test calibration remains a separate procedure.
    evidence:
      - url: https://doi.org/10.1016/j.spl.2007.02.008
        version: Statistics and Probability Letters 2007 universal residuals
    verified: 2026-07-14

  - id: dirichlet-posterior-summary-boundary
    guide: probability-and-generative-modeling.md
    anchor: a-distribution-atlas-organized-by-the-generated-object
    maturity: Established
    status: mle-mean-map-and-predictive-separated
    claim: >-
      Under categorical-Dirichlet conjugacy, adding alpha_j to a count produces
      the posterior mean and one-step posterior predictive numerator, whereas an
      interior MAP subtracts one and is valid only when every posterior parameter
      exceeds one; boundary modes require separate treatment.
    evidence:
      - url: https://doi.org/10.1214/aos/1176344611
        version: Annals of Statistics 1979 conjugate priors for exponential families
      - url: https://tminka.github.io/papers/dirichlet/
        version: Dirichlet support and parameter conventions, revised 2012
    verified: 2026-07-14

  - id: exponential-family-mle-existence-boundary
    guide: classical-generative-models.md
    anchor: moment-matching-has-an-existence-boundary
    maturity: Established
    status: convexity-minimality-and-attainment-separated
    claim: >-
      Log-partition convexity alone does not guarantee a unique finite
      natural-parameter MLE: strict coordinate uniqueness needs a minimal
      representation and finite moment matching requires the empirical statistic
      to be attained in the appropriate mean-parameter interior.
    evidence:
      - url: https://doi.org/10.1561/2200000001
        version: Foundations and Trends 2008 exponential-family geometry
      - url: https://doi.org/10.1214/08-EJS349
        version: Electronic Journal of Statistics 2009 directions of recession
    verified: 2026-07-14

  - id: markov-invariance-uniqueness-convergence-boundary
    guide: sampling-and-continuous-time.md
    anchor: time-homogeneity-is-not-stationarity
    maturity: Established
    status: process-kernel-and-convergence-properties-separated
    claim: >-
      Every finite transition matrix has an invariant law; irreducibility
      suffices for uniqueness while one closed recurrent class is the more
      general finite-state condition, aperiodicity is additionally required for
      ordinary marginal convergence from arbitrary starts, detailed balance
      implies invariance without those conditions, and time homogeneity is not
      stationarity without invariant initialization.
    evidence:
      - url: https://pages.uoregon.edu/dlevin/MARKOV/markovmixing.pdf
        version: Markov Chains and Mixing Times, second edition
    verified: 2026-07-14

  - id: divergence-versus-metric-boundary
    guide: objectives-and-statistical-distances.md
    anchor: hellinger-total-variation-and-chi-squared-conventions
    maturity: Established
    status: measure-orientation-and-metric-properties-separated
    claim: >-
      f-divergences require extended conventions for singular mass; Hellinger
      distance H is a metric but its square generally is not, and chi-squared
      divergences require an explicit orientation and scale before results can
      be compared.
    evidence:
      - url: https://real.mtak.hu/196543/
        version: Csiszar 1967 information-type divergence measures
      - url: https://web.stanford.edu/class/stats311/lecture-notes.pdf
        version: Stanford statistics and information theory notes, Hellinger metric conventions
    verified: 2026-07-14

  - id: generative-object-probability-semantics-boundary
    guide: probability-and-generative-modeling.md
    anchor: probability-and-generative-modeling
    maturity: Established
    status: object-law-and-query-separated
    claim: >-
      A probabilistic generator defines a probability law, whereas a
      deterministic program, grammar, decoder, or constraint solver can define
      a constructive generative operation without a normalized output law;
      probability notation is justified only after a law over seeds, choices,
      executions, or outputs has been declared.
    evidence:
      - url: https://proceedings.neurips.cc/paper_files/paper/2014/hash/f033ed80deb0234979a61f95710dbe25-Abstract.html
        version: NeurIPS 2014 GAN pushforward construction
      - url: https://jmlr.org/papers/volume24/22-0364/22-0364.pdf
        version: JMLR 2023 GFlowNet foundations and constructive terminal laws
    verified: 2026-07-14

  - id: conditional-law-versus-decision-rule
    guide: probability-and-generative-modeling.md
    anchor: a-conditional-law-is-not-a-decision-rule
    maturity: Established
    status: law-loss-action-and-sampler-separated
    claim: >-
      A conditional predictive law does not determine a point output until an
      action space and loss are specified; sampling, modal prediction, and
      Bayes-risk minimization answer different queries, and output dimension or
      the number of reference answers does not erase that distinction.
    evidence:
      - url: https://doi.org/10.1198/016214506000001437
        version: JASA 2007 proper scoring rules and Bayes-act framework
    verified: 2026-07-14

  - id: two-sample-training-monitoring-boundary
    guide: generative-model-evaluation.md
    anchor: two-sample-tests-are-finite-decision-procedures
    maturity: Established
    status: statistic-compute-and-inference-protocol-separated
    claim: >-
      Two-sample statistics can be evaluated approximately during training and
      MMD can itself be a differentiable generative objective, but a minibatch
      discrepancy or adaptively inspected validation curve is not automatically
      a calibrated sequential level-alpha hypothesis test.
    evidence:
      - url: https://www.jmlr.org/papers/v13/gretton12a.html
        version: JMLR 2012 kernel two-sample tests and linear-time approximations
      - url: https://proceedings.mlr.press/v37/li15.html
        version: ICML 2015 Generative Moment Matching Networks
    verified: 2026-07-14

  - id: unified-trilemma-not-theorem
    guide: generative-models-unified.md
    anchor: the-fundamental-trilemma
    maturity: Peer-reviewed research
    status: corrected
    claim: The generative learning trilemma is an empirical framing for declared methods and metrics, not a family-independent impossibility theorem assigning fixed corners to GANs, VAEs, and diffusion.
    evidence:
      - url: https://arxiv.org/abs/2112.07804
        version: ICLR 2022 paper
    verified: 2026-07-12

  - id: unified-direction-not-likelihood
    guide: generative-models-unified.md
    anchor: the-probabilistic-graphical-model-view
    maturity: Established
    status: corrected
    claim: Directed graphical structure alone does not give tractable marginal likelihood; AR local normalization and flow invertibility do, while general neural latent models still require marginalization.
    evidence:
      - url: https://arxiv.org/abs/1312.6114
        version: VAE arXiv v11
      - url: https://proceedings.mlr.press/v37/rezende15.html
        version: ICML 2015 proceedings
    verified: 2026-07-12

  - id: unified-cfg-density-boundary
    guide: generative-models-unified.md
    anchor: cfg-a-cross-family-technique
    maturity: Established
    status: corrected
    claim: Ideal score CFG has a pointwise tilted-density score interpretation, while cross-time consistency, finite learned fields, solver error, and AR per-prefix renormalization prevent a universal cross-family target-law claim.
    evidence:
      - url: https://arxiv.org/abs/2207.12598
        version: Ho and Salimans, 2022
    verified: 2026-07-12

  - id: unified-ddpm-hierarchical-latent-boundary
    guide: generative-models-unified.md
    anchor: 7-discrete-time-diffusion-as-a-hierarchical-latent-model
    maturity: Established
    status: bounded
    claim: A discrete-time DDPM admits a hierarchical latent-variable ELBO formulation; simplified loss weighting and continuous-time variants prevent treating all diffusion as algebraically identical to a VAE.
    evidence:
      - url: https://arxiv.org/abs/1503.03585
        version: ICML 2015 paper
      - url: https://arxiv.org/abs/2006.11239
        version: NeurIPS 2020 paper
    verified: 2026-07-12

  - id: diffusion-conditioned-posterior-vs-marginal-reverse
    guide: diffusion-explained.md
    anchor: worked-example-one-scalar-forward-and-posterior-step
    maturity: Established
    status: independently-derived-and-checked
    claim: >-
      The tractable Gaussian DDPM posterior q(x_{t-1}|x_t,x_0) is a
      clean-conditioned ELBO object, whereas generation requires a reverse
      kernel conditioned on x_t alone; marginalizing over q(x_0|x_t) generally
      produces a mixture, although the displayed Gaussian-data example remains
      Gaussian by joint Gaussian closure.
    evidence:
      - url: https://proceedings.neurips.cc/paper/2020/hash/4c5bcfec8584af0d967f1ab10179ca4b-Abstract.html
        version: NeurIPS 2020 proceedings and paper equations 6-7
    verified: 2026-07-13

  - id: diffusion-conditional-to-marginal-score-gaussian
    guide: diffusion-explained.md
    anchor: worked-example-one-scalar-forward-and-posterior-step
    maturity: Established
    status: population-optimum-boundary
    claim: >-
      Under the stated differentiability and integrability conditions, the
      conditional perturbation score averaged over q(x_0|x_t) equals the noisy
      marginal score; an individual sampled perturbation and its conditional
      score need not equal their posterior means at the observed x_t.
    evidence:
      - url: https://doi.org/10.1162/NECO_a_00142
        version: Neural Computation 23(7), 2011
      - url: https://openreview.net/forum?id=PxTIG12RRHS
        version: ICLR 2021 conference paper
    verified: 2026-07-13

  - id: diffusion-sde-ode-continuous-vs-finite
    guide: diffusion-explained.md
    anchor: worked-example-one-scalar-forward-and-posterior-step
    maturity: Established
    status: assumption-and-algorithm-bounded
    claim: >-
      With the exact marginal score, correct endpoint law, regularity, and exact
      integration, a reverse SDE and its probability-flow ODE share one-time
      marginals but not paths or transition kernels; their displayed one-step
      Euler and Euler-Maruyama discretizations produce different laws and both
      miss the Gaussian target.
    evidence:
      - url: https://openreview.net/forum?id=PxTIG12RRHS
        version: ICLR 2021 conference paper
      - url: https://proceedings.mlr.press/v267/pierret25a.html
        version: ICML 2025 proceedings
    verified: 2026-07-13

  - id: diffusion-gaussian-error-decomposition
    guide: probability-paths-and-stochastic-transport.md
    anchor: worked-gaussian-path-shared-marginals-different-finite-algorithms
    maturity: Peer-reviewed research
    status: error-channel-bounded
    claim: >-
      Gaussian diffusion analysis separates terminal initialization, truncation,
      numerical discretization, and score approximation; 2026 error analysis
      continues to retain finite-time, scheduling, discretization, statistical,
      and score-estimation terms rather than treating exact continuous dynamics
      as a certificate for a finite learned sampler.
    evidence:
      - url: https://proceedings.mlr.press/v267/pierret25a.html
        version: ICML 2025 proceedings
      - url: https://openreview.net/forum?id=uArYtsvW8o
        version: TMLR publication, April 2026
    verified: 2026-07-13

  - id: diffusion-acceleration-four-axis-boundary
    guide: diffusion-explained.md
    anchor: four-axes-of-diffusion-acceleration
    maturity: Interpretive synthesis
    status: primary-source-classified
    claim: >-
      Diffusion acceleration must distinguish changes to a numerical solver or
      evaluation schedule, a learned finite transition or student, the state
      representation, and the training target or probability path; systems
      optimizations change per-evaluation cost on an orthogonal axis, and one
      deployed generator may combine several axes.
    evidence:
      - url: https://proceedings.neurips.cc/paper_files/paper/2022/hash/260a14acce2a89dad36adc8eefe7c59e-Abstract-Conference.html
        version: NeurIPS 2022 proceedings
      - url: https://iclr.cc/virtual/2022/spotlight/6538
        version: ICLR 2022 conference record
      - url: https://openaccess.thecvf.com/content/CVPR2022/html/Rombach_High-Resolution_Image_Synthesis_With_Latent_Diffusion_Models_CVPR_2022_paper.html
        version: CVPR 2022 proceedings
      - url: https://proceedings.mlr.press/v267/frankel25a.html
        version: ICML 2025 proceedings
      - url: https://openreview.net/forum?id=R1l46h8kyM
        version: ICLR 2026 poster
    verified: 2026-07-13

  - id: diffusion-step-count-not-latency
    guide: diffusion-explained.md
    anchor: worked-counterexample-eight-reported-steps-can-be-faster-than-four
    maturity: Interpretive synthesis
    status: executable-accounting-counterexample
    claim: >-
      Outer transitions, branch-equivalent network evaluations, launched
      backbone calls, auxiliary calls, and end-to-end latency are distinct
      quantities; consequently a system with more reported outer steps can be
      faster when its stages and guidance branches are executed differently.
    evidence:
      - url: https://iclr.cc/virtual/2021/poster/2804
        version: ICLR 2021 conference record reporting wall-clock comparisons
      - url: https://proceedings.neurips.cc/paper_files/paper/2022/hash/260a14acce2a89dad36adc8eefe7c59e-Abstract-Conference.html
        version: NeurIPS 2022 proceedings reporting NFE comparisons
      - url: https://proceedings.mlr.press/v267/frankel25a.html
        version: ICML 2025 proceedings distinguishing few-NFE solver design
    verified: 2026-07-13

  - id: classifier-density-ratio-prior-correction
    guide: objectives-and-statistical-distances.md
    anchor: worked-example-from-a-classifier-to-a-ratio-value-and-generator-step
    maturity: Established
    status: independently-derived-and-checked
    claim: >-
      A population-optimal real-versus-generated classifier recovers the
      density ratio from its odds only after correcting for the declared class
      priors; raw odds equal the density ratio in the balanced-prior case.
    evidence:
      - url: https://proceedings.neurips.cc/paper_files/paper/2014/hash/f033ed80deb0234979a61f95710dbe25-Abstract.html
        version: NeurIPS 2014 proceedings and paper derivation
      - url: https://proceedings.neurips.cc/paper_files/paper/2016/hash/cedebb6e872f539bef8c3f919874e9d7-Abstract.html
        version: NeurIPS 2016 proceedings
    verified: 2026-07-13

  - id: gan-population-value-not-training-path
    guide: gan-explained.md
    anchor: four-objects-not-one-gan-loss
    maturity: Established
    status: objective-and-optimization-separated
    claim: >-
      The Bayes discriminator, the original minimax value after optimizing that
      discriminator, a chosen frozen-discriminator generator loss, and the path
      of finite alternating neural updates are distinct objects; the
      non-saturating replacement shares an ideal distribution-matching fixed
      point without becoming the finite-step derivative of the optimized JS value.
    evidence:
      - url: https://proceedings.neurips.cc/paper_files/paper/2014/hash/f033ed80deb0234979a61f95710dbe25-Abstract.html
        version: NeurIPS 2014 proceedings and paper sections 2-4
    verified: 2026-07-13

  - id: gan-pushforward-support-boundary
    guide: gan-explained.md
    anchor: from-a-deterministic-map-to-a-probability-law
    maturity: Established
    status: measure-density-and-dimension-separated
    claim: >-
      A measurable generator map defines a pushforward probability law without
      an inverse or output density; under ordinary local regularity, a latent
      dimension below the ambient output dimension generally produces a law
      singular to ambient volume, while declared observation noise changes the
      model and can produce a full-dimensional density.
    evidence:
      - url: https://proceedings.neurips.cc/paper_files/paper/2016/hash/cedebb6e872f539bef8c3f919874e9d7-Abstract.html
        version: NeurIPS 2016 generative neural sampler semantics
      - url: https://proceedings.mlr.press/v80/mescheder18a.html
        version: ICML 2018 lower-dimensional support analysis
    verified: 2026-07-14

  - id: gan-proper-scoring-margin-boundary
    guide: gan-explained.md
    anchor: proper-scoring-rules-and-density-ratio-recovery
    maturity: Established
    status: probability-estimation-and-margin-classification-separated
    claim: >-
      A strictly proper composite binary loss targets the class posterior under
      its link and population assumptions, whereas an ordinary hinge margin
      score is not by itself a calibrated posterior; density-ratio recovery
      additionally requires the declared real and generated class priors.
    evidence:
      - url: https://www.jmlr.org/papers/v11/reid10a.html
        version: JMLR 2010 proper composite and classification-calibrated losses
      - url: https://proceedings.neurips.cc/paper_files/paper/2014/hash/f033ed80deb0234979a61f95710dbe25-Abstract.html
        version: NeurIPS 2014 logistic population discriminator
    verified: 2026-07-14

  - id: gan-restricted-witness-boundary
    guide: gan-explained.md
    anchor: variational-f-divergence-witnesses
    maturity: Established
    status: population-supremum-and-finite-critic-separated
    claim: >-
      Restricting an exact variational f-divergence supremum to a neural critic
      gives a lower bound for a fixed generated law, and a finite constrained
      IPM critic supplies one witness value; minimizing either finite witness
      objective does not guarantee monotone decrease of the named population
      divergence or distance.
    evidence:
      - url: https://proceedings.neurips.cc/paper_files/paper/2016/hash/cedebb6e872f539bef8c3f919874e9d7-Abstract.html
        version: NeurIPS 2016 f-GAN variational formulation
      - url: https://proceedings.mlr.press/v70/arjovsky17a.html
        version: ICML 2017 Wasserstein dual GAN
    verified: 2026-07-14

  - id: gan-game-discretization-boundary
    guide: gan-explained.md
    anchor: worked-dynamical-example-one-game-three-trajectories
    maturity: Established
    status: equilibrium-continuous-and-discrete-dynamics-separated
    claim: >-
      In a scalar bilinear zero-sum game, continuous gradient flow preserves
      radius, simultaneous Euler expands squared radius by one plus step size
      squared, and an alternating update has a different determinant-one map;
      population equilibrium and optimizer trajectories are therefore distinct
      mathematical objects.
    evidence:
      - url: https://proceedings.mlr.press/v80/mescheder18a.html
        version: ICML 2018 local GAN dynamics and convergence counterexamples
    verified: 2026-07-14

  - id: gan-discrete-gradient-estimator-boundary
    guide: gan-explained.md
    anchor: discrete-outputs-require-an-estimator-choice
    maturity: Established
    status: state-space-density-access-and-gradient-estimator-separated
    claim: >-
      A hard discrete generator does not admit the ordinary pathwise derivative;
      score-function training requires a tractable normalized policy log mass,
      continuous relaxations optimize a relaxed game, and straight-through
      derivatives are generally biased, so discreteness alone makes a generator
      neither explicit nor stably trainable.
    evidence:
      - url: https://doi.org/10.1007/BF00992696
        version: Machine Learning 1992 score-function estimator
      - url: https://openreview.net/forum?id=rkE3y85ee
        version: ICLR 2017 categorical relaxation
    verified: 2026-07-14

  - id: sample-comparison-function-class-boundary
    guide: objectives-and-statistical-distances.md
    anchor: one-comparison-spine-which-witness-can-see-the-difference
    maturity: Interpretive synthesis
    status: primary-source-synthesized
    claim: >-
      Variational f-divergence bounds, IPMs, finite feature matching, and MMD
      differ by their witness classes and penalties: finite feature matching is
      a linear IPM, fixed-kernel MMD is an RKHS IPM, and an f-divergence
      conjugate form is not generally an IPM difference of expectations.
    evidence:
      - url: https://proceedings.neurips.cc/paper_files/paper/2016/hash/cedebb6e872f539bef8c3f919874e9d7-Abstract.html
        version: NeurIPS 2016 proceedings
      - url: https://jmlr.org/papers/v13/gretton12a.html
        version: JMLR 2012 paper
      - url: https://proceedings.mlr.press/v37/li15.html
        version: ICML 2015 proceedings
    verified: 2026-07-13

  - id: ar-var-scaling-statistic
    guide: autoregressive-explained.md
    anchor: 5-multiscale-visual-autoregressive-modeling-var
    maturity: Peer-reviewed research
    status: corrected
    claim: VAR reports fitted linear correlation coefficients near -0.998; the statistic is not a negative R-squared.
    evidence:
      - url: https://openreview.net/forum?id=gojL67CfS8
        version: NeurIPS 2024 conference record
    verified: 2026-07-12

  - id: ar-prefix-complexity-boundary
    guide: autoregressive-explained.md
    anchor: prefix-length-statistical-restriction-and-computation
    maturity: Established
    status: derived-and-assumption-bounded
    claim: Prefix argument count grows with position and unrestricted finite-alphabet tables grow exponentially, but this does not imply monotonically increasing intrinsic conditional complexity; a Markov window restricts the distribution, whereas recurrence and a full causal mask are parameterizations until their state or receptive field adds a restriction.
    evidence:
      - url: https://proceedings.mlr.press/v15/larochelle11a.html
        version: AISTATS 2011 proceedings
      - url: https://proceedings.mlr.press/v37/germain15.html
        version: ICML 2015 proceedings
      - url: https://proceedings.mlr.press/v235/dao24a.html
        version: ICML 2024 proceedings
    verified: 2026-07-13

  - id: ar-mamba3-state-tracking-boundary
    guide: autoregressive-explained.md
    anchor: 6-state-space-and-hybrid-causal-backbones
    maturity: Peer-reviewed research
    status: protocol-bounded
    claim: Mamba-3 changes the recurrent dynamics and reports improved retrieval, state tracking, and parity behavior under its ICLR 2026 protocols; this does not establish that every fixed-state recurrence has the same capabilities or dominates attention.
    evidence:
      - url: https://openreview.net/forum?id=HwCvaJOiCj
        version: ICLR 2026 Oral conference record
    verified: 2026-07-13

  - id: ar-nade-made-normalization-and-mask
    guide: autoregressive-explained.md
    anchor: nade-and-made-normalized-density-from-shared-computation
    maturity: Established
