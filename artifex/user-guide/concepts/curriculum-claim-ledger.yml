      symmetric nonzero tail dependence according to its stated formula; this
      asymptotic contrast does not determine every finite-threshold risk.
    evidence:
      - url: https://doi.org/10.1111/j.1751-5823.2005.tb00254.x
        version: International Statistical Review 2005
    verified: 2026-07-14

  - id: vine-simplifying-assumption-not-identity
