    verified: 2026-07-15

  - id: local-latent-scope-independence-boundary
    guide: latent-variables-and-inference.md
    anchor: local-and-global-latent-variables
    maturity: Established
    status: local-scope-and-posterior-factorization-separated
    claim: >-
      Calling a latent variable local specifies the observations, groups,
      nodes, or time indices in its scope; it does not imply that local
      variables are mutually independent in the prior or posterior, because
      transition, spatial, hierarchical, or shared factors can couple them.
    evidence:
      - url: https://doi.org/10.1561/2200000016
        version: Foundations and Trends 2011 variational inference for graphical models
      - url: https://ojs.aaai.org/index.php/AAAI/article/view/10779
        version: AAAI 2017 structured inference networks for state-space models
    verified: 2026-07-15

  - id: continuous-map-coordinate-boundary
    guide: latent-variables-and-inference.md
    anchor: map-depends-on-the-coordinate-used-for-a-continuous-density
    maturity: Established
    status: posterior-measure-density-mode-and-decision-separated
    claim: >-
      A continuous MAP maximizes a density relative to a chosen coordinate
      reference element and is generally not invariant under nonlinear
      reparameterization; it is distinct from posterior means, marginal modes,
      samples, credible mass, and Bayes actions.
    evidence:
      - url: https://doi.org/10.1214/12-STS413
        version: Statistical Science 2013 transformation and Bayesian parameterization discussion
    verified: 2026-07-15

  - id: laplace-coordinate-locality-boundary
    guide: latent-variables-and-inference.md
    anchor: laplace-approximation-is-local-and-coordinate-sensitive
    maturity: Established
    status: local-curvature-approximation-and-global-posterior-separated
    claim: >-
      A Laplace approximation is a local Gaussian construction around a mode;
      nonlinear reparameterization before approximation generally changes the
      result, while support boundaries, skewness, multiple modes, weak
      identification, and singular curvature can invalidate a global reading.
    evidence:
      - url: https://www.jmlr.org/papers/v26/24-0619.html
        version: JMLR 2025 finite-sample error bounds under explicit assumptions
    verified: 2026-07-15

  - id: posterior-reference-draw-boundary
    guide: latent-variables-and-inference.md
    anchor: layer-2-reference-targets-without-pretending-they-are-exact-truth
    maturity: Peer-reviewed research
    status: numerical-reference-and-exact-ground-truth-separated
    claim: >-
      Posterior benchmark draws are numerical reference calculations whose
      diagnostics, Monte Carlo uncertainty, parameterization, and provenance
      remain part of an evaluation; their presence does not turn a realistic
      target into an analytically exact oracle.
    evidence:
      - url: https://proceedings.mlr.press/v258/magnusson25a.html
        version: AISTATS 2025 posteriordb benchmark protocol
    verified: 2026-07-15

  - id: simulation-based-calibration-scope-boundary
    guide: latent-variables-and-inference.md
    anchor: layer-3-prior-predictive-simulation-based-calibration
    maturity: Established
    status: inference-self-consistency-and-model-adequacy-separated
    claim: >-
      Prior-predictive SBC tests self-consistency of model implementation and
      posterior computation over the declared generative experiment; a
      calibrated rank distribution does not establish model adequacy for real
      data, accuracy for every observation, or correctness of every joint query.
    evidence:
      - url: https://arxiv.org/abs/1804.06788
        version: revised 2020 simulation-based calibration procedure
    verified: 2026-07-15

  - id: posterior-coverage-guarantee-boundary
    guide: latent-variables-and-inference.md
    anchor: layer-4-validation-near-the-observed-data-posterior
    maturity: Peer-reviewed research
    status: posterior-sbc-sample-coverage-and-density-accuracy-separated
    claim: >-
      Posterior SBC, sample-based multivariate coverage tests, and conformalized
      marginal regions answer different validation questions; marginal coverage
      under an exchangeable calibration experiment does not prove conditional
      coverage for every observation or equality of a posterior density.
    evidence:
      - url: https://doi.org/10.1007/s11222-026-10825-9
        version: Statistics and Computing 2026 posterior SBC version of record
      - url: https://proceedings.mlr.press/v202/lemos23a.html
