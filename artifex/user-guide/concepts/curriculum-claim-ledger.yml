    verified: 2026-07-15

  - id: state-space-information-set-boundary
    guide: filtering-and-smoothing-state-space.md
    anchor: one-law-several-questions
    maturity: Established
    status: filtering-smoothing-forecasting-and-path-sampling-separated
    claim: >-
      Filtering, fixed-lag smoothing, fixed-interval smoothing, forecasting,
      and path sampling may use one state-space joint law but condition on
      different information and return different probabilistic objects; an
      offline encoder that sees future observations is not an online filter.
    evidence:
      - url: https://doi.org/10.2514/3.3166
        version: AIAA Journal 1965 linear dynamic smoothing
    verified: 2026-07-15

  - id: filtering-predictive-normalizer-boundary
    guide: filtering-and-smoothing-state-space.md
    anchor: deriving-the-exact-bayesian-filter
    maturity: Established
    status: correction-normalizer-and-sequence-evidence-linked
    claim: >-
      The normalization constant in an exact Bayesian filtering correction is
      the one-step predictive observation density, so summing its logs gives
      the sequence log likelihood; approximate local normalizers yield an
      approximate likelihood unless an additional estimator argument applies.
    evidence:
      - url: https://doi.org/10.1115/1.3662552
        version: ASME Journal of Basic Engineering 1960 filtering and prediction
    verified: 2026-07-15

  - id: kalman-exactness-closure-boundary
    guide: filtering-and-smoothing-state-space.md
    anchor: the-closure-assumptions
    maturity: Established
    status: linear-gaussian-posterior-and-linear-estimator-separated
    claim: >-
      The Kalman recursion returns the complete Bayesian filtering posterior
      under the declared affine Gaussian closure; with only moment assumptions
      it can retain a best-linear-estimator interpretation without making the
      full non-Gaussian posterior Gaussian.
    evidence:
      - url: https://doi.org/10.1115/1.3662552
        version: ASME Journal of Basic Engineering 1960
    verified: 2026-07-15

  - id: smoothed-marginal-path-boundary
    guide: filtering-and-smoothing-state-space.md
    anchor: forward-filtering-backward-sampling
    maturity: Established
    status: one-time-marginals-and-correlated-posterior-path-separated
    claim: >-
      Independently drawing correct smoothed one-time marginals does not sample
      the joint posterior trajectory; coherent path sampling must preserve the
      backward conditional kernels and cross-time dependence.
    evidence:
      - url: https://doi.org/10.1093/biomet/81.3.541
        version: Biometrika 1994 blocked state-space sampling
    verified: 2026-07-15

  - id: nonlinear-moment-representation-boundary
    guide: filtering-and-smoothing-state-space.md
    anchor: worked-failure-case-correct-moments-can-still-hide-the-answer
    maturity: Established
    status: transformed-moment-accuracy-and-posterior-family-accuracy-separated
    claim: >-
      Accurate transformed Gaussian moments do not make a joint-Gaussian
      conditioning approximation exact: an even observation such as a noisy
      square can have zero state-observation cross-covariance while creating a
      strongly bimodal posterior over sign.
    evidence:
      - url: https://doi.org/10.1109/JPROC.2003.823141
        version: Proceedings of the IEEE 2004 nonlinear filtering context
      - url: https://doi.org/10.1109/TAC.2009.2019800
        version: IEEE Transactions on Automatic Control 2009 cubature context
    verified: 2026-07-15

  - id: adf-gaussian-projection-kl-direction
    guide: filtering-and-smoothing-state-space.md
    anchor: assumed-density-filtering
    maturity: Established
    status: forward-kl-moment-projection-and-reverse-kl-separated
    claim: >-
      Projecting a distribution onto a Gaussian by matching its mean and
      covariance minimizes the forward direction D_KL(p||q) under finite-moment
      regularity; it is not the generic optimizer of D_KL(q||p), and repeated
      sequential projection can depend on factor order.
    evidence:
      - url: https://tminka.github.io/papers/ep/
        version: corrected UAI 2001 expectation-propagation record
    verified: 2026-07-15

  - id: nonlinear-ensemble-kalman-boundary
    guide: filtering-and-smoothing-state-space.md
    anchor: ensemble-kalman-filtering
    maturity: Established
    status: linear-gaussian-large-ensemble-limit-and-nonlinear-bayes-separated
    claim: >-
      Large-ensemble convergence of an EnKF to Kalman quantities under
      linear-Gaussian assumptions does not establish that the covariance-based
      affine analysis update converges to the exact nonlinear non-Gaussian
      Bayesian posterior.
    evidence:
      - url: https://doi.org/10.1029/94JC00572
        version: Journal of Geophysical Research 1994 ensemble construction
      - url: https://doi.org/10.1007/s10492-011-0031-2
        version: Applied Mathematics 2011 linear-Gaussian convergence scope
    verified: 2026-07-15

  - id: differentiable-filter-gradient-boundary
    guide: filtering-and-smoothing-state-space.md
    anchor: differentiating-through-a-filter
    maturity: Established
    status: finite-computation-derivative-and-exact-likelihood-gradient-separated
    claim: >-
      Backpropagation through a finite filter differentiates the executed
      solves, projections, resampling rules, and stopped operations; it does not
      by itself supply an unbiased derivative of the exact state-space
      likelihood or posterior query.
    evidence:
      - url: https://doi.org/10.15607/RSS.2018.XIV.001
        version: Robotics Science and Systems 2018 differentiable particle filter
      - url: https://doi.org/10.1016/j.sigpro.2025.109998
        version: Signal Processing 2025 learned proposal and transition
    verified: 2026-07-15

  - id: posterior-mode-decision-boundary
    guide: graphical-inference-and-message-passing.md
    anchor: posterior-modes-answer-different-decision-problems
    maturity: Established
    status: singleton-mode-max-marginal-mpe-and-marginal-map-separated
    claim: >-
      Coordinatewise marginal modes, max-marginals, a joint MPE assignment, and
      marginal MAP optimize different decision problems. Combining singleton
      marginal modes can even produce a configuration outside the support, so
      none may be substituted for another without a matching loss and query.
    evidence:
      - url: https://arxiv.org/abs/1202.3742
        version: UAI 2011 conference paper, arXiv record posted 2012
    verified: 2026-07-16

  - id: gaussian-message-exactness-boundary
    guide: graphical-inference-and-message-passing.md
    anchor: gaussian-messages-are-sparse-elimination-in-information-form
    maturity: Established
    status: tree-exactness-and-loopy-convergence-correctness-separated
    claim: >-
      Gaussian belief-propagation messages are local Schur-complement
      eliminations and recover exact Gaussian marginals on trees. On loopy
      graphs, convergence, exactness of means, and exactness of variances are
      distinct properties and require explicit conditions such as the relevant
      walk-summability or convergence assumptions.
    evidence:
      - url: https://www.jmlr.org/papers/v7/malioutov06a.html
        version: Journal of Machine Learning Research 2006 walk-sum analysis
    verified: 2026-07-15

  - id: configuration-gumbel-perturbation-boundary
    guide: graphical-inference-and-message-passing.md
    anchor: randomized-optimization-when-a-map-oracle-becomes-a-sampler
    maturity: Established
    status: complete-configuration-and-local-perturbations-separated
    claim: >-
      Finite Gumbel-Max is exact when each complete configuration receives the
      required independent Gumbel perturbation. Replacing those perturbations
      with independent unary or local-factor noise generally changes their
      dependence and therefore the optimizer's output law unless a separate
      exact construction is proved.
    evidence:
      - url: https://proceedings.neurips.cc/paper_files/paper/2014/hash/937debc749f041eb5700df7211ac795c-Abstract.html
        version: NeurIPS 2014 A-star sampling and Gumbel processes
      - url: https://proceedings.neurips.cc/paper/2013/hash/443cb001c138b2561a0d90720d6ce111-Abstract.html
        version: NeurIPS 2013 low-dimensional perturb-and-MAP
    verified: 2026-07-15

  - id: gaussian-perturb-solve-boundary
    guide: graphical-inference-and-message-passing.md
    anchor: randomized-optimization-when-a-map-oracle-becomes-a-sampler
    maturity: Established
    status: matching-precision-perturbation-and-approximate-solve-separated
    claim: >-
      For a positive-definite Gaussian precision J, solving JX=h+eta with
      eta distributed as Normal(0,J) produces exactly Normal(J inverse h,
      J inverse). A mismatched perturbation covariance or an inexact solve
      defines a different finite-compute sampler whose error must be assessed.
    evidence:
      - url: https://proceedings.neurips.cc/paper_files/paper/2010/hash/d09bf41544a3365a46c9077ebb5e35c3-Abstract.html
        version: NeurIPS 2010 Gaussian sampling by local perturbations
    verified: 2026-07-15

  - id: cavi-coordinate-optimum-boundary
    guide: latent-variables-and-inference.md
    anchor: from-the-functional-optimum-to-coordinate-ascent-vi
    maturity: Established
    status: coordinate-monotonicity-family-accuracy-and-global-optimality-separated
    claim: >-
      Holding all other mean-field factors fixed gives the normalized
      exponential expected-log-joint update for one factor. An exact coordinate
      update cannot decrease the ELBO, but the joint restricted problem can
      retain multiple fixed points, symmetry breaking, family error, and local
      optima.
    evidence:
      - url: https://www.jmlr.org/papers/v14/hoffman13a.html
        version: JMLR 2013 CAVI and stochastic variational inference
    verified: 2026-07-15

  - id: automatic-vi-accuracy-boundary
    guide: latent-variables-and-inference.md
    anchor: advi-transforms-the-target-as-well-as-the-sample
    maturity: Established
    status: automation-and-posterior-adequacy-separated
    claim: >-
      ADVI automates constraint transformations, a Gaussian variational family,
      automatic differentiation, and stochastic optimization. Its transformed
      target requires the change-of-variables Jacobian, while its automation
      does not remove family, parameterization, multimodality, optimization, or
      validation error.
    evidence:
      - url: https://www.jmlr.org/papers/v18/16-107.html
        version: JMLR 2017 ADVI
    verified: 2026-07-15

  - id: wake-sleep-distribution-boundary
    guide: latent-variables-and-inference.md
    anchor: wakesleep-separates-model-learning-from-recognition-learning
    maturity: Established
    status: wake-sleep-and-data-model-input-laws-separated
    claim: >-
      Wake-sleep trains generative and recognition networks with different
      sampling laws and generally different objectives. In particular, the
      sleep recognition update averages inclusive posterior fitting under the
      current model marginal over observations, so it need not cover real-data
      regions missed by that model.
    evidence:
      - url: https://doi.org/10.1126/science.7761831
        version: Science 1995 wake-sleep algorithm
      - url: https://arxiv.org/abs/1406.2751
        version: ICLR 2015 reweighted wake-sleep author version
    verified: 2026-07-15

  - id: expectation-propagation-local-projection-boundary
    guide: graphical-inference-and-message-passing.md
    anchor: expectation-propagation-replaces-one-site-through-a-tilted-law
    maturity: Established
    status: local-forward-projection-and-global-divergence-minimization-separated
    claim: >-
      One EP site update removes a cavity site, restores the exact factor to
      form a tilted law, and projects that tilted law by forward KL, which
      moment-matches a supported exponential family. Repeated EP updates are
      not thereby one global forward-KL minimization and need not converge or
      yield proper intermediate sites.
    evidence:
      - url: https://tminka.github.io/papers/ep/
        version: Corrected UAI 2001 paper and MIT thesis
      - url: https://proceedings.neurips.cc/paper/2015/hash/f3bd5ad57c8389a8a1a541a76be463bf-Abstract.html
        version: NeurIPS 2015 stochastic expectation propagation
    verified: 2026-07-15

  - id: monte-carlo-rate-dimension-boundary
    guide: sampling-and-continuous-time.md
    anchor: monte-carlo-begins-with-a-query
    maturity: Established
    status: iid-sample-count-rate-and-dimensional-difficulty-separated
    claim: >-
      The iid finite-variance Monte Carlo root-mean-square error decreases as
      N to the minus one-half, but the variance constant, rare-region discovery,
      evaluation cost, and cost of obtaining a valid draw can all deteriorate
      with dimension; the exponent is not a dimension-free tractability result.
    evidence:
      - url: https://artowen.su.domains/mc/
        version: Monte Carlo theory and quasi-Monte Carlo reference materials
    verified: 2026-07-15

  - id: monte-carlo-normal-interval-boundary
    guide: sampling-and-continuous-time.md
    anchor: what-an-ordinary-monte-carlo-error-bar-assumes
    maturity: Established
    status: asymptotic-iid-interval-and-universal-finite-sample-coverage-separated
    claim: >-
      Replacing the finite iid variance by its sample estimate in a normal
      central-limit interval gives an asymptotic uncertainty procedure, not a
      universal finite-sample guarantee; dependence, heavy tails, rare events,
      and adaptive stopping require their own analysis.
    evidence:
      - url: https://artowen.su.domains/mc/
        version: Monte Carlo theory and error assessment
    verified: 2026-07-15

  - id: mcmc-effective-sample-size-observable-boundary
    guide: sampling-and-continuous-time.md
    anchor: correlated-draws-change-estimator-uncertainty
    maturity: Established
    status: observable-specific-variance-equivalence-and-global-mixing-separated
    claim: >-
      A Markov-chain effective sample size derived from integrated
      autocorrelation is a variance-equivalent sample count for a declared
      observable under the estimator's stationarity and central-limit
      conditions. It is not the importance-weight ESS, need not be bounded by
      the number of states when negative correlation is useful, and cannot
      certify that an undiscovered mode was explored.
    evidence:
      - url: https://doi.org/10.1214/ss/1177011137
        version: Statistical Science 1992 practical Markov chain Monte Carlo
      - url: https://doi.org/10.1214/09-AOS735
        version: Annals of Statistics 2010 batch-means variance estimation
    verified: 2026-07-15

  - id: rejection-normalizer-and-dimensional-cost-boundary
    guide: sampling-and-continuous-time.md
    anchor: rejection-sampling-exposes-its-normalizer
    maturity: Established
    status: exact-conditional-law-and-computational-efficiency-separated
    claim: >-
      If gamma is bounded by Mq and Z is its integral, rejection sampling
      accepts with mean probability Z over M and returns the normalized gamma
      law conditional on acceptance. Exactness does not imply efficiency: a
      one-percent isotropic Gaussian scale mismatch has acceptance
      1.01 to the minus d.
    evidence:
      - url: https://doi.org/10.1007/978-1-4757-4145-2
        version: Monte Carlo Statistical Methods rejection construction
    verified: 2026-07-15

  - id: antithetic-output-covariance-boundary
    guide: sampling-and-continuous-time.md
    anchor: antithetic-pairs-and-common-random-numbers-answer-different-questions
    maturity: Established
    status: valid-symmetric-marginals-and-variance-reduction-separated
    claim: >-
      Pairing symmetric base noises Z and minus Z preserves each marginal, but
      it reduces variance for a chosen generator statistic only when the paired
      transformed outputs have negative covariance; input symmetry alone does
      not prove this sign after a nonlinear generator.
    evidence:
      - url: https://doi.org/10.1017/S0305004100031455
        version: Mathematical Proceedings of the Cambridge Philosophical Society 1956
      - url: https://iclr.cc/virtual/2026/poster/10011071
        version: ICLR 2026 diffusion-model application and empirical scope
    verified: 2026-07-15

  - id: qmc-rqmc-uncertainty-boundary
    guide: sampling-and-continuous-time.md
    anchor: deterministic-qmc-randomized-qmc-and-uncertainty
    maturity: Established
    status: low-discrepancy-integration-and-iid-error-analysis-separated
    claim: >-
      A deterministic QMC point set has no ordinary iid sampling standard
      error. A valid RQMC randomization preserves uniform marginals and
      low-discrepancy structure, while repeat-based uncertainty is estimated
      across independent randomizations rather than across dependent points
      inside one scramble; favorable rates require integrand regularity and
      effective-dimension conditions.
    evidence:
      - url: https://proceedings.mlr.press/v80/buchholz18a.html
        version: ICML 2018 QMC variational inference
      - url: https://www.jmlr.org/papers/v22/21-0498.html
        version: JMLR 2021 RQMC quasi-Newton variational Bayes
    verified: 2026-07-15

  - id: fixed-randomness-population-objective-boundary
    guide: sampling-and-continuous-time.md
    anchor: fixed-randomness-creates-a-finite-optimization-problem
    maturity: Established
    status: finite-sample-optimization-and-population-optimization-separated
    claim: >-
      Fixing Monte Carlo draws produces a deterministic finite sample-average
      objective on which line searches and convergence tests can be meaningful,
      but a small finite-objective optimization residual does not establish
      optimality for the population expectation; fresh draws or increasing
      sample size are needed to assess that gap.
    evidence:
      - url: https://www.jmlr.org/papers/v25/23-1015.html
        version: JMLR 2024 deterministic ADVI and sample-average approximation
    verified: 2026-07-15

  - id: rqmc-generative-application-scope-boundary
    guide: sampling-and-continuous-time.md
    anchor: current-generative-applications-with-bounded-claims
    maturity: Peer-reviewed research
    status: current-method-results-bounded-by-query-and-regime
    claim: >-
      ICLR 2026 results demonstrate useful RQMC and coupled-randomness designs
      for specialized very low-dimensional latent marginalization and for
      selected diffusion-model uncertainty queries. They do not establish that
      RQMC replaces high-dimensional posterior inference or that antithetic
      generator outputs have negative covariance for every model and statistic.
    evidence:
      - url: https://openreview.net/forum?id=fdLU72nQdr
        version: ICLR 2026 quasi-Monte Carlo latent-variable models
      - url: https://iclr.cc/virtual/2026/poster/10011071
        version: ICLR 2026 antithetic noise in diffusion models
      - url: https://openreview.net/forum?id=Ahdsg2nkNH
        version: ICLR 2026 multilevel control functionals
    verified: 2026-07-15

  - id: mcmc-warmup-mixing-boundary
    guide: sampling-and-continuous-time.md
    anchor: mixing-time-is-a-theorem-warmup-is-a-workflow
    maturity: Established
    status: kernel-mixing-warmup-adaptation-and-retention-separated
    claim: >-
      A worst-case mixing time is a property of a specified kernel, target,
      tolerance, and state space, whereas practical warmup can combine
      initialization movement and adaptation. Discarding early states or
      freezing an adapted kernel does not prove stationarity or mode discovery.
    evidence:
      - url: https://pages.uoregon.edu/dlevin/MARKOV/markovmixing.pdf
        version: Markov Chains and Mixing Times second edition
      - url: https://doi.org/10.1239/jap/1183667414
        version: Journal of Applied Probability 2007 adaptive-MCMC conditions
    verified: 2026-07-15

  - id: gibbs-acceptance-mixing-boundary
    guide: sampling-and-continuous-time.md
    anchor: 4-gibbs-blocks-and-auxiliary-variables
    maturity: Established
    status: full-conditional-invariance-and-global-exploration-separated
    claim: >-
      A compatible full-conditional Gibbs update has Metropolis acceptance one,
      but scalar scans can remain arbitrarily autocorrelated under strong
      dependence. Blocking, collapsing, augmentation, and scan order change
      transition geometry and cost without receiving a universal efficiency
      ordering.
    evidence:
      - url: https://doi.org/10.1109/TPAMI.1984.4767596
        version: IEEE TPAMI 1984 Gibbs distributions and relaxation
      - url: https://doi.org/10.1214/aos/1056562461
        version: Annals of Statistics 2003 slice augmentation
    verified: 2026-07-15

  - id: mcmc-diagnostics-certificate-boundary
    guide: sampling-and-continuous-time.md
    anchor: 7-warmup-geometry-and-mcmc-diagnostics
    maturity: Established
    status: finite-run-failure-diagnostics-and-convergence-proof-separated
    claim: >-
      Rank-normalized split and folded R-hat, bulk and tail ESS, MCSE, rank
      plots, and HMC divergences probe different finite-run failures. Agreement
      inside one undiscovered mode can make every reported scalar look
      satisfactory, so no diagnostic panel certifies global convergence.
    evidence:
      - url: https://doi.org/10.1214/20-BA1221
        version: Bayesian Analysis 2021 rank-normalized diagnostics and localization
    verified: 2026-07-15

  - id: stochastic-gradient-mcmc-exactness-boundary
    guide: sampling-and-continuous-time.md
    anchor: 8-stochastic-gradient-and-kinetic-mcmc
    maturity: Established
    status: exact-gradient-corrected-and-stochastic-gradient-dynamics-separated
    claim: >-
      Minibatch-gradient noise is not automatically calibrated thermal noise.
      Decreasing-step SGLD claims require their schedule and regularity
      assumptions, while constant-step SGLD and practical SGHMC retain
      discretization and gradient-noise error unless a separate exact
      correction is established.
    evidence:
      - url: https://icml.cc/2011/papers/398_icmlpaper.pdf
        version: ICML 2011 stochastic gradient Langevin dynamics
      - url: https://proceedings.mlr.press/v32/cheni14.html
        version: ICML 2014 stochastic gradient Hamiltonian Monte Carlo
    verified: 2026-07-15

  - id: reversible-jump-dimension-matching-boundary
    guide: sampling-and-continuous-time.md
    anchor: 9-transdimensional-and-structure-changing-mcmc
    maturity: Established
    status: cross-model-density-and-dimension-matched-measure-separated
    claim: >-
      Reversible-jump MCMC compares states from different-dimensional component
      spaces only after auxiliary variables create equal-dimensional forward
      and reverse coordinates. Target, model-move, auxiliary-proposal, and
      Jacobian factors are all part of the acceptance rule.
    evidence:
      - url: https://doi.org/10.1093/biomet/82.4.711
        version: Biometrika 1995 reversible-jump MCMC
    verified: 2026-07-15

  - id: annealing-tempering-ais-output-boundary
    guide: sampling-and-continuous-time.md
    anchor: 10-annealing-and-tempering
    maturity: Established
    status: changing-target-optimization-product-chain-and-weighted-path-separated
    claim: >-
      Simulated annealing is a changing-temperature optimization procedure,
      parallel tempering is MCMC on a product of tempered laws with corrected
      swaps, and AIS is a weighted path estimator. Sharing an intermediate
      temperature schedule does not make their outputs interchangeable.
    evidence:
      - url: https://doi.org/10.1023/A:1008923215028
        version: Statistics and Computing 2001 annealed importance sampling
      - url: https://doi.org/10.1103/PhysRevLett.57.2607
        version: Physical Review Letters 1986 replica Monte Carlo construction
    verified: 2026-07-15

  - id: corrected-learned-mcmc-scope-boundary
    guide: sampling-and-continuous-time.md
    anchor: research-directions-that-preserve-the-contract
    maturity: Peer-reviewed research
    status: learned-efficiency-component-and-target-correction-separated
    claim: >-
      Learned transports and locally adaptive integrators can improve proposals
      or coordinates in evaluated regimes, but target validity comes from the
      surrounding Jacobian, Metropolis, reversible-jump, or tempered-kernel
      construction. Current results do not justify arbitrary within-trajectory
      adaptation or uncorrected learned proposals.
    evidence:
      - url: https://proceedings.mlr.press/v206/davies23a.html
        version: AISTATS 2023 transport reversible-jump proposals
      - url: https://www.jmlr.org/papers/v27/25-1452.html
        version: JMLR 2026 WALNUTS
      - url: https://openreview.net/forum?id=CODnlyYUli
        version: ICLR 2026 neural-transport parallel tempering
    verified: 2026-07-15

  - id: smc-normalizer-expectation-bias-boundary
    guide: sequential-monte-carlo-and-particle-methods.md
    anchor: weighted-empirical-laws-and-their-limits
    maturity: Established
    status: normalizer-and-normalized-expectation-properties-separated
    claim: >-
      Under a proper standard SMC construction, the normalizing-constant
      estimator can be unbiased while a self-normalized finite-particle
      expectation is generally biased. The logarithm of a positive unbiased
      normalizer estimate is also generally downward biased by concavity.
    evidence:
      - url: https://doi.org/10.1111/j.1467-9868.2006.00553.x
        version: JRSSB 2006 Sequential Monte Carlo Samplers
      - url: https://proceedings.mlr.press/v84/naesseth18a.html
        version: AISTATS 2018 Variational Sequential Monte Carlo
    verified: 2026-07-15

  - id: smc-resampling-degeneracy-boundary
    guide: sequential-monte-carlo-and-particle-methods.md
    anchor: three-degeneracies
    maturity: Established
    status: current-weight-particle-and-genealogical-degeneracy-separated
    claim: >-
      Resampling reallocates computation away from small current weights, but
      it duplicates particles and coalesces lineages. Equal post-resampling
      weights or a large importance-weight ESS therefore cannot certify state
      support, unique ancestry, smoothing accuracy, or low Monte Carlo error.
    evidence:
      - url: https://doi.org/10.1049/ip-f-2.1993.0015
        version: IEE Proceedings F 1993 bootstrap particle filter
      - url: https://arxiv.org/abs/1509.00394
        version: 2018 Biometrika variance estimation through particle genealogy
    verified: 2026-07-15

  - id: systematic-resampling-variance-boundary
    guide: sequential-monte-carlo-and-particle-methods.md
    anchor: resampling-is-an-offspring-distribution
    maturity: Established
    status: conditional-variance-ordering-qualified
    claim: >-
      Residual and stratified resampling admit standard conditional-variance
      improvements over multinomial resampling, whereas systematic resampling
      has dependent offspring and does not universally dominate multinomial
      resampling for every ordered particle system and estimator.
    evidence:
      - url: https://arxiv.org/abs/cs/0507025
        version: ISPA 2005 author version with systematic-resampling counterexample
    verified: 2026-07-15

  - id: locally-optimal-particle-proposal-boundary
    guide: sequential-monte-carlo-and-particle-methods.md
    anchor: the-locally-optimal-proposal
    maturity: Established
    status: conditional-weight-variance-and-global-efficiency-separated
    claim: >-
      The observation-conditioned state transition minimizes the variance of
      the next incremental weight conditional on one ancestor when it is
      tractable. Its predictive-likelihood weight still varies across
      ancestors, and the result does not establish globally optimal smoothing,
      path diversity, runtime, or model-learning gradients.
    evidence:
      - url: https://doi.org/10.1007/978-1-4757-3437-9
        version: 2001 Sequential Monte Carlo Methods in Practice
    verified: 2026-07-15

  - id: particle-mcmc-exact-marginal-boundary
    guide: sequential-monte-carlo-and-particle-methods.md
    anchor: particle-markov-chain-monte-carlo
    maturity: Established
    status: extended-target-validity-and-finite-mixing-separated
    claim: >-
      Particle MCMC obtains an exact desired marginal through an extended-space
      MCMC construction under its assumptions. PMMH uses a nonnegative unbiased
      likelihood estimator rather than an unbiased log likelihood; noisy
      estimates and path degeneracy can still make finite outer-chain mixing
      poor.
    evidence:
      - url: https://doi.org/10.1111/j.1467-9868.2009.00736.x
        version: JRSSB 2010 Particle Markov Chain Monte Carlo Methods
      - url: https://www.jmlr.org/papers/v15/lindsten14a.html
        version: JMLR 2014 Particle Gibbs with Ancestor Sampling
    verified: 2026-07-15

  - id: differentiable-twisted-smc-scope-boundary
    guide: sequential-monte-carlo-and-particle-methods.md
    anchor: why-resampling-complicates-differentiation
    maturity: Peer-reviewed research
    status: derivative-program-target-correction-and-finite-particle-scope-separated
    claim: >-
      Stopped, relaxed, score-function, marginalized, and transport resampling
      define different derivative programs with different bias, variance, and
      compute. A learned proposal or twist improves a named particle system but
      preserves the endpoint only through its complete correction; finite
      differentiability or a positive twist is not by itself exact conditional
      generation.
    evidence:
      - url: https://proceedings.mlr.press/v139/corenflos21a.html
        version: ICML 2021 entropy-regularized optimal-transport resampling
      - url: https://proceedings.neurips.cc/paper_files/paper/2022/hash/fddc79681b2df2734c01444f9bc2a17e-Abstract-Conference.html
        version: NeurIPS 2022 smoothing inference with twisted objectives
      - url: https://proceedings.neurips.cc/paper_files/paper/2023/hash/63e8bc7bbf1cfea36d1d1b6538aecce5-Abstract-Conference.html
        version: NeurIPS 2023 Twisted Diffusion Sampler
    verified: 2026-07-15

  - id: dense-transformer-six-nd-boundary
    guide: compute-and-controlled-comparisons.md
    anchor: flop-conventions
    maturity: Peer-reviewed research
    status: fitted-dense-transformer-heuristic-and-total-systems-cost-separated
    claim: >-
      The Chinchilla scaling analysis constrains its fitted dense autoregressive
      Transformer frontier with FLOPs(N,D) approximately equal to 6ND. That
      approximation is specific to its accounting and experimental regime; it
      is not an exact operator profile, wall-clock model, or universal
      compute-optimal law for attention-dominated, sparse, multimodal, diffusion,
      optimizer-heavy, or communication-bound systems.
    evidence:
      - url: https://papers.nips.cc/paper_files/paper/2022/hash/c1e2faff6f588870935f114ebe04a3e5-Abstract-Conference.html
        version: NeurIPS 2022 paper and Section 3.3 efficient-frontier constraint
    verified: 2026-07-16

  - id: differential-privacy-unit-composition-boundary
    guide: data-governance-and-provenance.md
    anchor: differential-privacy
    maturity: Established
    status: declared-adjacency-randomized-mechanism-and-broader-promise-separated
    claim: >-
      A differential-privacy guarantee belongs to a randomized mechanism and a
      declared neighboring-dataset relation. Repeated releases compose privacy
      loss, and a one-record guarantee does not automatically provide the same
      protection for a user or group contributing multiple records; the unit
      and release boundary must match the privacy promise.
    evidence:
      - url: https://doi.org/10.1561/0400000042
        version: Algorithmic Foundations of Differential Privacy, Definition 2.4 and Chapters 2-3
    verified: 2026-07-16

  - id: score-matching-assumption-boundary
    guide: density-latent-energy-relationships.md
    anchor: score-matching
    maturity: Established
    status: normalizer-free-population-objective-and-finite-recovery-separated
    claim: >-
      Classical score matching removes the unknown normalizer from its
      computable objective by integration by parts under differentiability and
      boundary assumptions. Its consistency result additionally requires a
      correctly specified identifiable positive-density model, increasing
      sample size, and successful optimization; a finite neural training run
      does not inherit exact density recovery from the population identity.
    evidence:
      - url: https://jmlr.org/papers/v6/hyvarinen05a.html
        version: JMLR 2005 Theorems 1-2 and Corollary 3
    verified: 2026-07-16

  - id: generator-matching-marginal-path-boundary
    guide: general-markov-generators.md
    anchor: 3-conditional-to-marginal-generator-matching
    maturity: Peer-reviewed research
    status: marginal-kfe-and-sample-path-equivalence-separated
    claim: >-
      Generator Matching posterior-averages valid conditional generators to
      construct a generator for the marginal probability path, and its
      conditional and marginal Bregman objectives have the same parameter
      gradient under the paper's linear parameterization. This identifies the
      one-time marginal evolution, not equality of individual sample paths,
      multi-time couplings, arbitrary losses, or finite simulators.
    evidence:
      - url: https://arxiv.org/abs/2410.20587
        version: arXiv v3 matching the ICLR 2025 paper, Propositions 1-2 and Figure 2
      - url: https://iclr.cc/virtual/2025/oral/31846
        version: official ICLR 2025 oral record
    verified: 2026-07-16

  - id: riemannian-score-process-boundary
    guide: geometric-equivariant-generative-modeling.md
    anchor: intrinsic-probability
    maturity: Peer-reviewed research
    status: intrinsic-manifold-diffusion-and-ambient-projection-separated
    claim: >-
      Riemannian score-based generation defines the forward diffusion directly
      on a declared Riemannian manifold and derives a manifold-valued reverse
      diffusion with an intrinsic score under explicit measure and regularity
      assumptions. Ambient Gaussian perturbation followed by projection is an
      extrinsic numerical construction and is not automatically the same
      stochastic process or density.
    evidence:
      - url: https://proceedings.neurips.cc/paper_files/paper/2022/hash/105112d52254f86d5854f3da734a52b4-Abstract-Conference.html
        version: NeurIPS 2022 Sections 3.1-3.4 and Theorem 1
    verified: 2026-07-16

  - id: artifact-reproducibility-validity-boundary
    guide: reproducibility-and-research-methods.md
    anchor: artifact-availability-versus-scientific-validity
    maturity: Peer-reviewed research
    status: inspectable-artifact-and-scientific-correctness-separated
    claim: >-
      Code submission, reproducibility challenges, and reporting checklists make
      machine-learning results easier to inspect and reproduce, but released
      code can itself contain mistakes and a reproducibility program is only one
      part of scientific quality control. Artifact availability therefore does
      not by itself establish an unconfounded experiment, a correct mechanism,
      or independent replication.
    evidence:
      - url: https://www.jmlr.org/papers/v22/20-303.html
        version: JMLR 2021 NeurIPS reproducibility-program report, Sections 2.6-6
    verified: 2026-07-16

  - id: consistency-model-one-step-boundary
    guide: transitions-and-few-step-generation.md
    anchor: 2-consistency-models-and-flow-map-matching
    maturity: Peer-reviewed research
    status: endpoint-consistency-and-general-two-time-map-separated
    claim: >-
      A consistency model is trained to map states on the same probability-flow
      ODE trajectory to a common endpoint with an identity boundary condition,
      enabling one-network-evaluation generation; it may be trained by teacher
      distillation or as a standalone model. The construction is not required
      to be invertible and does not by itself learn every two-time flow map or
      equate all systems described informally as one-step generators.
    evidence:
      - url: https://proceedings.mlr.press/v202/song23a.html
        version: ICML 2023 definition, Sections 3-5, and one-step experiments
    verified: 2026-07-16
