    status: conditional-copula-and-approximation-bounded
    claim: >-
      Pair-copula decomposition is an exact density identity, while a
      simplified vine additionally assumes that each conditional pair copula
      has no direct dependence on the values of its conditioning variables;
      tractability under this assumption is not evidence that it holds.
    evidence:
      - url: https://doi.org/10.1214/aos/1031689016
        version: Annals of Statistics 2002 vine construction
      - url: https://doi.org/10.1016/j.jmva.2009.12.001
