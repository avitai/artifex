  - id: multisample-objective-estimator-boundary
    guide: gradients-and-geometry-in-generative-modeling.md
    anchor: multi-sample-bounds-couple-objective-and-estimator
    maturity: Peer-reviewed research
    status: bound-tightness-estimator-signal-and-model-learning-separated
    claim: >-
      Increasing an importance-weighted variational particle count changes and
      can tighten the population bound, yet the usual inference-network
      gradient can lose signal-to-noise; DReG, VIMCO, and wake-sleep updates
      have distinct estimator assumptions or population targets.
    evidence:
      - url: https://proceedings.mlr.press/v80/rainforth18b.html
        version: ICML 2018 multi-sample inference-gradient signal
      - url: https://openreview.net/forum?id=HkG3e205K7
