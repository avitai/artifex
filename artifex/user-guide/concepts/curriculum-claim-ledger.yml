  - id: linear-state-space-stability-and-stationarity
    guide: classical-generative-models.md
    anchor: system-identification-and-stability
    maturity: Established
    status: autonomous-process-and-noise-bounded
    claim: >-
      A finite-noise autonomous discrete-time linear latent process has a
      unique finite stationary covariance under the standard spectral-radius
      condition rho(A) less than one, satisfying a discrete Lyapunov equation;
      process noise does not stabilize an unstable transition, and filter-error
      stability is a distinct property with broader conditions.
    evidence:
