  - id: point-process-janossy-reference-measure-convention
    guide: point-processes-and-random-finite-sets.md
    anchor: janossy-densities-the-factorial-is-part-of-the-definition
    maturity: Established
    status: measure-and-ordering-bounded
    claim: >-
      Under the declared symmetric Janossy-density convention on a bounded
      window, cardinality mass is one over n factorial times the integral of
      j_n, and j_n equals n factorial times cardinality mass times the
      normalized symmetric conditional tuple density. Different Poisson or set
      references move constants and cannot be mixed without conversion.
    evidence:
      - url: https://www.math.kit.edu/stoch/~last/seite/lectures_on_the_poisson_process/media/lastpenrose2017.pdf
        version: Last and Penrose 2017 point-process monograph, Janossy measures
      - url: https://doi.org/10.1111/j.1467-9469.2007.00569.x
        version: Moller and Waagepetersen 2007 spatial point-process likelihood review
    verified: 2026-07-14

  - id: point-process-first-order-intensity-not-full-law
    guide: point-processes-and-random-finite-sets.md
    anchor: first-order-intensity-does-not-determine-interaction
    maturity: Established
    status: moment-versus-law-bounded
    claim: >-
      A spatial first-order intensity determines expected local counts but not
      higher-order dependence; Poisson, Cox, cluster, Gibbs, and determinantal
      constructions can match first-order intensity while assigning different
      clustering, repulsion, and empty-space probabilities.
    evidence:
      - url: https://doi.org/10.1111/1467-9469.00115
        version: 1998 Log Gaussian Cox Processes
      - url: https://doi.org/10.1561/2200000044
        version: 2012 DPP monograph
    verified: 2026-07-14

  - id: point-process-hawkes-stability-boundary
    guide: point-processes-and-random-finite-sets.md
    anchor: linear-hawkes-processes
    maturity: Established
    status: linear-nonnegative-stationary-bounded
    claim: >-
      For the univariate nonnegative linear Hawkes branching construction, the
      kernel integral eta less than one is the subcritical stationarity
      condition and gives stationary mean intensity mu over one minus eta. It
      is not an unchanged criterion for nonlinear, signed, nonstationary, or
      merely finite-window models.
    evidence:
      - url: https://doi.org/10.1093/biomet/58.1.83
        version: Hawkes 1971 self- and mutually exciting processes
    verified: 2026-07-14

  - id: point-process-compensator-estimator-transform-boundary
    guide: point-processes-and-random-finite-sets.md
    anchor: exact-likelihood-and-numerical-integration
    maturity: Established
    status: estimator-and-nonlinear-transform-bounded
    claim: >-
      Uniform Monte Carlo can estimate an integrable finite-window compensator
      without bias, but exponentiating an unbiased log-likelihood estimate does
      not generally give an unbiased likelihood estimator because expectation
      does not commute with the exponential.
    evidence:
      - url: https://doi.org/10.1162/08997660252741149
        version: Brown et al. 2002 compensator and time-rescaling treatment
    verified: 2026-07-14

  - id: point-process-thinning-envelope-validity
    guide: point-processes-and-random-finite-sets.md
    anchor: ogata-style-thinning
    maturity: Established
    status: domination-and-history-bounded
    claim: >-
      Conditional-intensity thinning is exact only when its predictable
      proposal intensity dominates the target over the interval where the bound
      is used. Clipping an acceptance ratio after an underbound does not restore
      the target law.
    evidence:
      - url: https://doi.org/10.1109/TIT.1981.1056305
        version: Ogata 1981 thinning algorithm
    verified: 2026-07-14

