  - id: bnp-stick-breaking-order-boundary
    guide: bayesian-nonparametric-models-explained.md
    anchor: stick-breaking-atoms-and-size-biased-weights
    maturity: Established
    status: representation-bounded
    claim: >-
      In the Sethuraman representation of a Dirichlet-process draw, beta breaks
      generate a size-biased ordering of atom masses rather than their decreasing
      rank order; deterministic truncation of that sequence is a finite
      approximation or altered model, not marginalization of the infinite tail.
    evidence:
      - url: https://www.jstor.org/stable/24305538
        version: Statistica Sinica 1994 constructive representation
      - url: https://doi.org/10.1214/06-BA104
