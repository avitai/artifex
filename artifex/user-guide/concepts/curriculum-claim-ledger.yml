    anchor: 4-hard-constraints-formal-languages-and-feasible-geometry
    maturity: Established
    status: measure-and-map-bounded
    claim: >-
      Exact projection onto a nonempty feasible set can guarantee output
      location, but the resulting law is the base law's pushforward through the
      projection and is generally not the base law conditioned on feasibility;
      feasible invertible maps instead require their own Jacobian and support
      accounting.
    evidence:
