        supports: Learned perturb-and-max-product proposals for approximate sampling in discrete factor graphs.
    assumptions:
      family_independent:
        - The target law, auxiliary-noise joint distribution, optimization domain, tie rule, and solve accuracy are declared.
        - An exact claim proves that the optimizer pushforward has the target law; otherwise approximation error is measured against a named query.
      family_specific:
        - Finite Gumbel-Max needs an independent Gumbel for each complete configuration unless an alternative exact construction is proved.
        - Gaussian perturb-and-solve needs a matching quadratic factorization and an exact linear solve; truncated iterative solves add sampler error.
    failure_boundaries:
      - Independent unary or factorwise perturbations generally do not reproduce independent configuration-level Gumbels and therefore change the output law.
      - A randomized local optimum is not automatically a sample from the globally normalized target.
      - Learned perturbations can improve empirical proposals without inheriting exactness from the optimizer they call.
      - Optimization tolerances, nonunique optima, and numerical factorization error are part of the sampler definition.
    pedagogy:
      orientation: A three-outcome Gumbel-Max example turns normalized weights into exact categorical samples.
      formalism: Pushforward-law criterion, configuration versus local perturbations, and Gaussian covariance derivation.
      practice: Target, noise, optimizer, tie, tolerance, and diagnostic audit checklist.
      research: Structured perturb-and-MAP, lazy Gumbel processes, learned perturbations, and bounded 2026 discrete distillation links.
    implementation_status: validated_existing

  - id: mcmc_kernel_design_and_diagnostics
    name: MCMC kernel design, geometry, and finite-run diagnostics
    abstraction_layer: sampler
    canonical_definition: >-
      Construct a transition or valid adaptive transition sequence for a
      declared target, prove invariance or the relevant asymptotic contract,
      establish reachability and recurrence assumptions, and estimate named
      queries with dependence-aware uncertainty and failure-specific
      diagnostics.
    gap: resolved_by_sampling_foundation_expansion
    decision: merged_into_existing
    rationale: >-
      Metropolis correction, Gibbs and auxiliary-variable updates, Langevin and
      Hamiltonian dynamics, pseudo-marginal augmentation, transdimensional
      moves, and tempering are reusable samplers or inference components. They
      operate on targets from many generative families and do not define a new
      probability family.
    canonical_owner: sampling-and-continuous-time.md#2-markov-chains-and-stationarity
    cross_links:
      - sampling-and-continuous-time.md#3-metropolishastings
      - sampling-and-continuous-time.md#4-gibbs-blocks-and-auxiliary-variables
      - sampling-and-continuous-time.md#6-hamiltonian-monte-carlo
