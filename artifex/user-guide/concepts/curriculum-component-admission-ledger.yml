  - id: graphical_inference_and_message_passing
    name: Graphical inference, exact compilation, and learned message passing
    abstraction_layer: inference
    canonical_definition: >-
      Answer a declared normalizer, marginal, conditional, MAP, or sampling
      query by exploiting factor scopes through elimination, cached tree or
      junction-tree messages, approximate loopy or variational messages,
      compiled circuits, or a learned inference map with an explicit target.
    gap: >-
      Classical, latent, state-space, and circuit volumes named individual
      algorithms but did not provide one executable derivation linking
      enumeration, intermediate factors, induced width, two-pass messages,
      cluster calibration, loopy failure, differentiation, and amortization.
    decision: accepted
    rationale: >-
      The same inference component applies to directed, undirected, latent,
      energy, state-space, circuit, and neural-factor models without defining a
      new generative-model family. It therefore needs one cross-cutting owner.
    canonical_owner: graphical-inference-and-message-passing.md
