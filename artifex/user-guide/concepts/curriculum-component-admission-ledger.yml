      - Unbiased estimation of Z does not make log Z unbiased.
      - High observed ESS cannot certify coverage of an unseen mode.
      - Learned proposals or transports need the declared importance, SMC, or MH correction unless they themselves define the requested normalized model.
      - Reverse stochastic bounds require their exact endpoint initialization rather than an approximately mixed substitute.
    pedagogy:
      orientation: One finite latent marginal with exact enumeration and ordinary importance sampling.
      formalism: Change of measure, path-space weights, bridge and path identities, and prior-mass transformation.
