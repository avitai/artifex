      - url: https://arxiv.org/abs/2606.31137
        maturity: preprint
        supports: A 2026 mechanics-informed state and model-learning interface using approximate Bayesian filters.
    assumptions:
      family_independent:
        - The state-space joint law, controls, initial law, transition, observation model, support, and missingness mechanism are declared.
        - Filtering, fixed-lag smoothing, fixed-interval smoothing, forecasting, evidence, and path sampling retain distinct information sets and returned objects.
        - Exactness claims state closure, integration, support, and numerical-rank assumptions; approximations state representation, projection, finite-compute, and validation error.
      family_specific:
        - Linear-Gaussian closure, finite-state dynamic programming, particles, mixtures, ensembles, variational paths, flows, and learned beliefs expose different guarantees and query costs.
        - Controlled world models may require online beliefs for decisions, while offline representation learning may legally use a smoother; continuous-time generators add solver-induced transition error.
    failure_boundaries:
      - A Kalman-named update is not the exact nonlinear or non-Gaussian posterior.
      - Correct transformed moments do not make a one-Gaussian approximation adequate for multimodal or constrained beliefs.
      - Forward-KL Gaussian moment matching is not reverse-KL projection, and sequential projection can be order dependent.
      - An infinite nonlinear EnKF ensemble does not generically recover exact nonlinear Bayes conditioning.
      - Correct smoothed marginals sampled independently do not form a correct posterior trajectory.
      - Differentiable filtering does not by itself supply an unbiased exact-likelihood gradient through resampling or finite approximations.
      - Simulator-relative NIS, NEES, or coverage does not validate the real-data state-space model.
