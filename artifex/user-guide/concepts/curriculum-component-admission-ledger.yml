      - filtering-and-smoothing-state-space.md#6-particles-learning-validation-and-method-choice
    primary_evidence:
      - url: https://doi.org/10.1093/biomet/57.1.97
        maturity: peer_reviewed
        supports: Asymmetric-proposal Metropolis-Hastings correction.
      - url: https://doi.org/10.1239/jap/1183667414
        maturity: peer_reviewed
        supports: Adaptive-MCMC ergodicity conditions and counterexamples.
      - url: https://doi.org/10.1214/07-AOS574
        maturity: peer_reviewed
        supports: Pseudo-marginal exactness on an augmented state.
      - url: https://doi.org/10.1214/aos/1056562461
        maturity: peer_reviewed
        supports: Slice augmentation and transition constructions.
      - url: https://www.jmlr.org/papers/v15/hoffman14a.html
        maturity: peer_reviewed
        supports: NUTS trajectory construction and step-size adaptation.
      - url: https://doi.org/10.1214/20-BA1221
        maturity: peer_reviewed
        supports: Rank-normalized split R-hat, folded checks, bulk and tail ESS, and MCSE.
      - url: https://doi.org/10.1093/biomet/82.4.711
        maturity: peer_reviewed
        supports: Reversible-jump dimension matching and Jacobian correction.
      - url: https://www.jmlr.org/papers/v27/25-1452.html
        maturity: peer_reviewed
        supports: Reversible within-orbit local step-size adaptation for multiscale HMC in 2026.
      - url: https://openreview.net/forum?id=CODnlyYUli
        maturity: peer_reviewed
        supports: ICLR 2026 neural transports inside a corrected parallel-tempering system.
    assumptions:
      family_independent:
        - The target, support, base measure, kernel or adaptive sequence, initialization, retained phase, observables, and cost unit are declared.
        - Invariance, uniqueness, distributional convergence, ergodic averages, mixing time, and finite-run precision remain separate claims.
        - Learned maps and proposals preserve exactness only through their Jacobian, weight, or acceptance construction.
      family_specific:
        - Gibbs requires available compatible full conditionals or valid within-block kernels.
        - Gradient MCMC requires the stated differentiability, geometry, noise calibration, and discretization or acceptance contract.
        - Structure-changing kernels require dimension matching relative to declared component measures.
    failure_boundaries:
      - Warmup length is not a theorem about worst-case mixing and discarding states cannot prove mode discovery.
      - Acceptance one in Gibbs and high acceptance in MH or HMC do not establish efficient exploration.
      - Traditional unsplit R-hat, one scalar ESS, or zero divergences cannot certify a high-dimensional chain.
      - Fixed-step ULA and stochastic-gradient methods are not exact merely because their continuous-time analogue has the desired invariant law.
      - Simulated annealing, parallel tempering, and AIS return different objects.
    pedagogy:
      orientation: A moving-law diagram and two-state chain separate invariance, marginal convergence, and path averages.
      formalism: MH flow, Gibbs conditionals, slice augmentation, MALA ratio, HMC leapfrog, long-run variance, RJMCMC Jacobian, and tempered swap ratio.
      practice: Warmup-versus-mixing table, modern multi-chain diagnostics, HMC and transdimensional reporting, and cost-normalized method comparison.
      research: Pseudo-marginal and adaptive kernels, learned transports, discrete proposals, WALNUTS, diffusion-based Monte Carlo, and neural parallel tempering with maturity bounds.
    implementation_status: validated

  - id: monte_carlo_estimation_and_randomness_design
    name: Monte Carlo estimation, uncertainty, and randomness design
    abstraction_layer: estimator
    canonical_definition: >-
      Approximate a declared expectation, integral, objective, difference, or
      resolution hierarchy with finite evaluations whose marginal laws,
      dependence, bias, variance, and uncertainty procedure are explicit.
    gap: resolved_by_sampling_foundation_expansion
    decision: merged_into_existing
    rationale: >-
      Iid averages, rejection efficiency, Rao-Blackwellization, control
      variates, antithetic pairs, common random numbers, QMC/RQMC, fixed sample
      averages, multilevel couplings, and dependence-aware Markov-chain error
      estimates are reusable estimator designs. They affect training,
      inference, evaluation, and uncertainty across model families but do not
      define another probability family.
    canonical_owner: sampling-and-continuous-time.md#monte-carlo-begins-with-a-query
    cross_links:
      - sampling-and-continuous-time.md#variance-reduction-and-randomness-design
      - sampling-and-continuous-time.md#correlated-draws-change-estimator-uncertainty
      - latent-variables-and-inference.md#advi-transforms-the-target-as-well-as-the-sample
      - gradients-and-geometry-in-generative-modeling.md#one-derivative-several-estimator-families
      - likelihood-and-normalizer-estimation.md#importance-sampling
      - generative-models-unified.md#how-to-read-this-volume
    primary_evidence:
      - url: https://proceedings.mlr.press/v80/buchholz18a.html
        maturity: peer_reviewed
        supports: QMC designs for score-function and pathwise Monte Carlo variational objectives.
      - url: https://www.jmlr.org/papers/v22/21-0498.html
        maturity: peer_reviewed
        supports: Independently randomized QMC combined with quasi-Newton variational optimization under bounded rate conditions.
      - url: https://www.jmlr.org/papers/v25/23-1015.html
        maturity: peer_reviewed
        supports: Fixed-randomness sample-average approximation for automatic mean-field VI and its expressivity boundary.
      - url: https://www.jmlr.org/papers/v22/20-653.html
        maturity: peer_reviewed
        supports: Multilevel coupling for reparameterized variational-gradient estimation.
      - url: https://openreview.net/forum?id=fdLU72nQdr
        maturity: peer_reviewed
        supports: ICLR 2026 randomized lattice integration for specialized very low-dimensional deep latent-variable models.
      - url: https://iclr.cc/virtual/2026/poster/10011071
        maturity: peer_reviewed
        supports: ICLR 2026 antithetic initial-noise and RQMC designs for diffusion-model uncertainty queries.
      - url: https://openreview.net/forum?id=Ahdsg2nkNH
        maturity: peer_reviewed
        supports: ICLR 2026 multilevel learned control functionals under smoothness and moderate-dimension conditions.
    assumptions:
      family_independent:
        - The target law, observable, estimator, marginal sample laws, dependence, and cost unit are declared.
        - Iid central-limit error bars require finite variance and an asymptotic regime; dependent designs use their own variance analysis.
        - Markov-chain long-run variance and effective sample size are defined for a declared observable under stationarity and central-limit conditions.
        - A variance-reduction claim compares equal target expectations and matched computation or reports bias and cost separately.
      family_specific:
        - Generator base-noise symmetries preserve input marginals but do not guarantee negative covariance after a nonlinear generator and observable.
        - RQMC performance depends on the integrand, transformation, smoothness, and effective dimension of the family-specific query.
        - Multilevel methods require a meaningful family-specific fidelity hierarchy and coupled adjacent levels.
    failure_boundaries:
      - The iid root-N exponent does not make high-dimensional sampling or rare-event discovery dimension independent.
      - One deterministic QMC point set has no ordinary iid standard error; repeat-based uncertainty requires independent valid randomizations.
      - Convergence on a fixed sample-average objective is not convergence on the population objective.
      - Common random numbers target a comparison variance and need not improve either marginal estimate.
      - Unbiasedness for a finite-resolution target does not remove continuum discretization bias.
      - An observable-specific MCMC effective sample size is not an importance-weight ESS or a certificate that every mode was discovered.
    pedagogy:
      orientation: A finite three-state expectation separates a correct point estimate from its Monte Carlo uncertainty.
      formalism: Iid CLT, rejection normalizer, Markov-chain long-run variance, observable-specific ESS, total variance, optimal control coefficient, antithetic and paired-difference variance, SAA, and multilevel telescope.
      practice: Error-source ledger, replicated-randomization protocol, cost-matched comparison table, two-state dependence calculation, and high-dimensional rejection counterexample.
      research: Bounded QMC VI, RQMC quasi-Newton, deterministic ADVI, multilevel VI, and three peer-reviewed ICLR 2026 generative applications.
    implementation_status: validated

  - id: sequential_monte_carlo_and_particle_methods
    name: Sequential Monte Carlo and particle methods
    abstraction_layer: inference
    canonical_definition: >-
      Approximate a declared sequence of normalized or unnormalized target laws
      with a properly weighted interacting population whose mutation,
      selection, ancestry, normalizer, and returned query are explicit.
    gap: resolved_by_dedicated_foundation_volume
    decision: accepted
    rationale: >-
      Particle filtering, static-target SMC, smoothing, PMCMC, rare-event SMC,
      differentiable particle objectives, and particle-guided generators were
      distributed across filtering, latent-inference, sampling, normalizer, and
      family chapters. They share a reusable Feynman–Kac and proper-weighting
      contract that is too broad for any one application chapter but does not
      define a new probability-model family.
    canonical_owner: sequential-monte-carlo-and-particle-methods.md
    cross_links:
