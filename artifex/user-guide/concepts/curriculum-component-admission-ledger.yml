      family_independent:
        - The unnormalized target, support, base measure, and desired ratio direction are declared.
        - Proposals and paths cover the target mass required by the estimator identity.
        - Transition, resampling, bridge, quadrature, and numerical operations satisfy the stated construction.
      family_specific:
        - Latent marginals are often per-example, EBM partition functions are shared at fixed parameters, and Bayesian evidence integrates parameter priors.
        - Tractable flows, autoregressive models, and circuits may avoid Monte Carlo normalization while retaining other numerical or marginalization errors.
