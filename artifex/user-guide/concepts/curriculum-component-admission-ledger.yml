schema_version: 1
created: 2026-07-14
last_updated: 2026-07-15
current_verification_cutoff: 2026-07-15

purpose: >-
  Record the review of generative architectures, objectives, estimators,
  samplers, representations, conditioning mechanisms, evaluation methods,
  post-training procedures, and system compositions. This ledger prevents a
  reusable component from being mislabeled as a model family and prevents a
  generic machine-learning technique from entering the book without a direct
  generative role.

governing_gate:
  required_fields:
    - canonical definition and abstraction layer
    - missing capability or verified existing coverage
    - primary evidence and maturity
    - family-independent and family-specific assumptions
    - one canonical owner and explicit cross-links
    - mechanism, consequences, failures, evaluation, and compute
    - beginner, formal, practice, and research pedagogy layers

audit_scope:
  current_primary_search:
    venues:
      - ICLR 2026 official program and OpenReview records
      - ICML 2026 and PMLR records where applicable
      - NeurIPS, TMLR, ACL, NAACL, CVPR, and canonical journal records
    topics:
      - conditioning, guidance, Doob transforms, and posterior sampling
      - hard constraints, grammars, feasible maps, and projection
      - candidate selection, search, verifiers, and test-time compute
      - retrieval and composed generative systems
      - topology-changing flows and learned representations
      - quantization and tokenizer-prior co-design
      - probing protocols, representation similarity, and auxiliary feature alignment
      - autoregressive block proposals, visual token consistency, and dynamic patchification
      - exact and approximate filtering, smoothing, differentiable filters, and current state-space inference
      - Gaussian belief propagation, perturb-and-MAP, perturb-and-solve, Gumbel processes, and learned message passing
      - CAVI, VMP, SVI, BBVI, ADVI, EP, weighted bounds, wake-sleep, and current posterior-family research
      - Monte Carlo uncertainty, randomized QMC, sample-average approximation, coupled estimators, and current generative applications
      - adaptive, pseudo-marginal, blocked, Hamiltonian, stochastic-gradient, transdimensional, tempered, and transport-assisted MCMC
      - particle filtering, SMC samplers, resampling theory, particle smoothing, PMCMC, learned proposals, differentiable resampling, twists, and generator control

classification_contract:
  architecture: parameterizes a model object, target, transition, or inference map
  objective_or_loss: defines a population target or optimization surrogate
  estimator: approximates an objective, expectation, gradient, or normalizer
  sampler: produces draws or approximate draws from a declared target
  representation: changes the state coordinates, alphabet, support, or codec interface
  conditioning: supplies observed context or a target event to a model or sampler
  inference: answers a posterior, evidence, latent, or conditional query
  model_selection: chooses a probabilistic structure or structural equivalence class under a declared score, test, prior, and data regime
  evaluation: estimates a named property of a model or composed system
  post_training: changes behavior after base training through additional optimization or selection
  system_composition: combines independently identifiable model and non-model components
  non_family_rule: >-
    Reuse across families is evidence that a component needs a cross-cutting
    owner, not evidence that it defines a new probability family.

summary:
  candidates_reviewed: 28
  accepted_new_or_expanded: 14
  merged_into_existing: 11
  rejected_as_out_of_scope_or_non_specific: 3
  canonical_volumes_added:
    - conditioning-steering-and-constraints.md
    - likelihood-and-normalizer-estimation.md
    - graphical-inference-and-message-passing.md
    - filtering-and-smoothing-state-space.md
    - sequential-monte-carlo-and-particle-methods.md
  projections_added: 30
  scientific_correction: >-
    Autoregressive hard masking now states that prefixwise renormalization need
    not equal the base full-sequence law conditioned on final validity; exact
    global conditioning also needs valid-completion mass.

candidates:
  - id: target_reweighting_and_tilting
    name: Target reweighting, likelihood conditioning, and exponential tilting
    abstraction_layer: objective_or_loss
    canonical_definition: >-
      Given base law p0 and nonnegative integrable factor w, define the target
      pi(x|c)=p0(x|c)w(x,c)/E_p0[w(X,c)]. This defines a law but not an algorithm.
    gap: >-
      Rewards, energies, likelihoods, constraints, and guidance appeared across
      family guides without one target-first change-of-measure contract.
    decision: accepted
    rationale: >-
      The component directly determines what controlled generation should
      sample and prevents arbitrary scores from being called posteriors.
    canonical_owner: conditioning-steering-and-constraints.md#1-begin-with-the-target-not-the-steering-algorithm
    cross_links:
      - objectives-and-statistical-distances.md#10-composite-objectives-and-identifiability
      - sampling-and-continuous-time.md#1-direct-rejection-and-importance-sampling
      - generative-models-unified.md#conditional-generation-how-each-family-handles-control
    primary_evidence:
      - url: https://proceedings.neurips.cc/paper/2021/hash/49ad23d1ec9fa4bd8d77d02681df5cfa-Abstract.html
        maturity: peer_reviewed
        supports: Likelihood-gradient steering in diffusion under a noise-aware classifier.
      - url: https://proceedings.neurips.cc/paper/2020/hash/6b493230-Abstract.html
        maturity: peer_reviewed
        supports: Marginalizing retrieval state in a composed conditional generator.
    assumptions:
      family_independent:
        - The factor is nonnegative, measurable, and has a finite positive normalizer.
        - Absolute-continuity reweighting cannot create support absent from the base law.
      family_specific:
        - Each family still needs a compatible sampler, estimator, or training objective.
    failure_boundaries:
      - A reward is not a likelihood without a declared joint observation model.
      - Maximizing a proxy can worsen the real outcome even when optimization succeeds.
    pedagogy:
      orientation: Three-outcome numerical reweighting.
      formalism: Normalizer, support, hard-event, and Bayesian special cases.
      practice: Target-and-mechanism register.
      research: Support and target-misspecification boundaries.
    implementation_status: validated

  - id: conditional_architectural_interfaces
    name: Conditional objectives and neural conditioning interfaces
    abstraction_layer: conditioning
    canonical_definition: >-
      A conditional model represents or constructs outputs given observed
      context; concatenation, modulation, cross-attention, adapters, and prefix
      tokens are alternative carriers rather than conditional semantics.
    gap: >-
      Family chapters described their own interfaces, but no shared treatment
      separated the observational conditional from its neural carrier.
    decision: accepted
    rationale: >-
      The distinction applies across every neural family and prevents
      architecture identity from being mistaken for probabilistic identity.
    canonical_owner: conditioning-steering-and-constraints.md#2-training-time-conditioning-and-architectural-interfaces
    cross_links:
      - representations-and-multimodal-systems.md#3-conditioning-fusion-and-cross-modal-alignment
      - causal-generative-models-explained.md
      - autoregressive-explained.md
      - diffusion-explained.md
    primary_evidence:
      - url: https://papers.nips.cc/paper/2015/hash/8d55a249e6baa5c06772297520da2051-Abstract.html
        maturity: peer_reviewed
        supports: Conditional latent-variable modeling with amortized inference.
      - url: https://arxiv.org/abs/2207.12598
        maturity: preprint
        supports: Shared conditional and condition-dropped prediction for classifier-free guidance.
    assumptions:
      family_independent:
        - Training conditions and deployment conditions have declared support.
      family_specific:
        - Likelihood, score, adversarial, flow, and reconstruction objectives identify different quantities.
    failure_boundaries:
      - Null-context training is not exact marginalization by construction.
      - Observational conditioning is not an intervention without causal assumptions.
    pedagogy:
      orientation: Binary marginal-versus-conditional example.
      formalism: Conditional population objective.
      practice: Interface and missing-condition audit.
      research: Causal and support-shift boundary.
    implementation_status: validated

  - id: path_guidance_and_doob_transforms
    name: Continuous score guidance, discrete Doob transforms, and twisted SMC
    abstraction_layer: sampler
    canonical_definition: >-
      Modify a base Markov path using a backward evidence or terminal-value
      function so its endpoint follows a conditional or reweighted target;
      approximate guides and particles approximate that change of measure.
    gap: >-
      The book covered classifier guidance and SMC separately but did not derive
      their shared change-of-measure object or finite-state counterpart.
    decision: accepted
    rationale: >-
      It unifies continuous and discrete control without claiming their finite
      algorithms or network targets are identical.
    canonical_owner: conditioning-steering-and-constraints.md#3-guidance-doob-transforms-and-twisted-sampling
    cross_links:
      - diffusion-explained.md#guidance-techniques
      - discrete-iterative-generation-explained.md#conditioning-and-guidance
      - sampling-and-continuous-time.md
      - latent-variables-and-inference.md#6-sequential-monte-carlo
    primary_evidence:
      - url: https://openreview.net/forum?id=r9s3Gbxz7g
        maturity: peer_reviewed_workshop
        supports: Twisted SMC construction for diffusion conditional sampling.
      - url: https://openreview.net/forum?id=xoXn62FzD0
        maturity: peer_reviewed
        supports: SMC control of language generation with programmable potentials.
      - url: https://iclr.cc/virtual/2026/poster/10009901
        maturity: peer_reviewed
        supports: Exact target-rate derivation for discrete flow guidance under learned guidance objects.
      - url: https://openreview.net/forum?id=cpdHmRtx7d
        maturity: peer_reviewed
        supports: ICLR 2026 Monte Carlo correction for training-free diffusion guidance.
    assumptions:
      family_independent:
        - The backward value is finite and positive on traversed support.
        - Importance corrections cover the target path law.
      family_specific:
        - Continuous gradients, discrete rate ratios, and AR logits require different algebra.
    failure_boundaries:
      - Finite guidance scale and numerical steps need not realize the ideal endpoint law.
      - Finite particles can collapse to one ancestry despite formally correct weights.
    pedagogy:
      orientation: Two-terminal-state likelihood example.
      formalism: Score identity and Doob transition/rate formulas.
      practice: Six-part guidance error budget.
      research: 2026 continuous/discrete evidence boundaries.
    implementation_status: validated

  - id: hard_constrained_generation
    name: Hard constraints, grammar viability, projection, and feasible maps
    abstraction_layer: sampler
    canonical_definition: >-
      Return outputs inside a declared feasible set or formal language while
      stating separately whether and how the procedure preserves a target law.
    gap: >-
      Existing constrained decoding equated local renormalization too strongly
      with global conditional sampling and other families lacked a common audit.
    decision: accepted
    rationale: >-
      Feasibility is central in structured text, scientific generation,
      geometry, and design and cannot be reduced to soft conditioning.
    canonical_owner: conditioning-steering-and-constraints.md#4-hard-constraints-formal-languages-and-feasible-geometry
    cross_links:
      - autoregressive-explained.md#constrained-decoding
      - geometric-equivariant-generative-modeling.md
      - flow-explained.md#what-changes-when-the-transformation-is-not-bijective
      - generative-model-evaluation.md#3-conditional-fidelity-calibration-and-task-utility
    primary_evidence:
      - url: https://proceedings.neurips.cc/paper_files/paper/2024/hash/d15c16cf5619a2b1606da5fc88e3f1a9-Abstract-Conference.html
        maturity: peer_reviewed
        supports: Logical language-model control with tractable auxiliary structure.
      - url: https://iclr.cc/virtual/2026/poster/10011297
        maturity: peer_reviewed
        supports: Context-free constrained decoding for arbitrary-order diffusion-LM infilling.
      - url: https://openreview.net/forum?id=vxq1OnaAMq
        maturity: peer_reviewed
        supports: Gauge-map constrained flow matching for declared feasible-set classes.
      - url: https://openreview.net/forum?id=1FEm5JLpvg
        maturity: peer_reviewed
        supports: Projected coupled diffusion for test-time joint constraints.
    assumptions:
      family_independent:
        - Feasible set, tolerance, termination, and support overlap are declared.
      family_specific:
        - Parser state, projection geometry, Markov kernel, and Jacobian semantics differ.
    failure_boundaries:
      - Binary prefix viability omits unequal valid-completion mass.
      - Projection generally produces a pushforward law rather than a conditional law.
      - Formal validity does not imply semantic, physical, or causal correctness.
    pedagogy:
      orientation: Two-prefix global-conditioning counterexample.
      formalism: Event conditioning, suffix mass, projection, and feasible-map Jacobian.
      practice: Six-mechanism constraint audit.
      research: Current formal-language and feasible-geometry methods.
    implementation_status: validated

  - id: candidate_selection_search_and_mbr
    name: Rejection, importance resampling, best-of-N, search, and minimum Bayes risk
    abstraction_layer: post_training
    canonical_definition: >-
      Generate proposals from a base law and accept, weight, search, or choose an
      action using a score or loss, thereby defining a new output or decision rule.
    gap: >-
      Compute accounting named best-of-N and verifiers, but the book did not
      derive the returned law or separate MBR decisions from samples.
    decision: accepted
    rationale: >-
      Inference-time scaling is scientifically interpretable only when the
      selected distribution, scorer error, and compute are explicit.
    canonical_owner: conditioning-steering-and-constraints.md#5-reweighting-candidate-selection-search-and-decisions
    cross_links:
      - autoregressive-explained.md#generation-and-sampling-strategies
      - compute-and-controlled-comparisons.md
      - generative-model-evaluation.md#guidance-and-decoding-are-part-of-the-system
    primary_evidence:
      - url: https://aclanthology.org/2025.naacl-long.472/
        maturity: peer_reviewed
        supports: Reward-overoptimization boundary for best-of-N and MBR in named LM protocols.
      - url: https://openreview.net/forum?id=TD9jC48sts
        maturity: peer_reviewed
        supports: ICLR 2026 exploration-then-generation candidate sampling.
      - url: https://iclr.cc/virtual/2026/poster/10008045
        maturity: peer_reviewed
        supports: Lossless self-speculative correction for any-subset autoregressive models.
    assumptions:
      family_independent:
        - Candidate proposal, score distribution, independence, and tie rule are declared.
      family_specific:
        - Search state, verifier, and cache/NFE units differ by modality and family.
    failure_boundaries:
      - Best-of-N is an order-statistic law, not generally an exponential tilt.
      - Larger pools increase exposure to verifier misspecification.
      - MBR returns a decision, not a posterior draw.
    pedagogy:
      orientation: Binary best-of-three success calculation.
      formalism: Acceptance and continuous best-of-N densities.
      practice: Candidate, verifier, search, and compute reporting contract.
      research: Selected-distribution calibration and reward hacking.
    implementation_status: validated

  - id: retrieval_augmented_generation
    name: Retrieval-augmented generative composition
    abstraction_layer: system_composition
    canonical_definition: >-
      A retriever over a versioned external index supplies random or selected
      context to a conditional generator; the system law marginalizes retrieval state.
    gap: >-
      Retrieval was named in production and governance sections but lacked a
      generative law, attribution example, and component evaluation contract.
    decision: accepted
    rationale: >-
      Retrieval materially changes generation, updateability, provenance,
      privacy, latency, and evidence without defining a new base model family.
    canonical_owner: conditioning-steering-and-constraints.md#6-retrieval-and-composed-generative-systems
    cross_links:
      - data-governance-and-provenance.md
      - generative-model-evaluation.md
      - compute-and-controlled-comparisons.md
      - autoregressive-explained.md
    primary_evidence:
      - url: https://proceedings.neurips.cc/paper/2020/hash/6b493230-Abstract.html
        maturity: peer_reviewed
        supports: Parametric generator plus nonparametric retrieval composition.
    assumptions:
      family_independent:
        - Index, retriever, selection rule, and context construction are versioned.
      family_specific:
        - Text passages, images, audio, exemplars, and scientific structures need different retrieval/evaluation units.
    failure_boundaries:
      - Retrieval does not prove relevance, entailment, freshness, rights, or truth.
      - A system score cannot attribute error without conditioning on retrieval quality.
    pedagogy:
      orientation: Two-state retrieval/generation accuracy decomposition.
      formalism: Marginal system output law.
      practice: Retriever, generator, filter, and router ledger.
      research: Attribution and selected-context shift.
    implementation_status: validated

  - id: topology_changing_flow_components
    name: Surjective, injective, and augmented flow components
    abstraction_layer: architecture
    canonical_definition: >-
      Transformations that aggregate preimages, embed a lower-dimensional law,
      or add auxiliary variables, thereby changing likelihood and measure semantics.
    gap: >-
      The flow guide named these remedies for topology mismatch without deriving
      their distinct density contracts.
    decision: accepted
    rationale: >-
      They address real support and topology limitations but remain flow/latent
      components rather than a new family umbrella.
    canonical_owner: flow-explained.md#what-changes-when-the-transformation-is-not-bijective
    cross_links:
      - latent-variables-and-inference.md
      - geometric-equivariant-generative-modeling.md
      - conditioning-steering-and-constraints.md#4-hard-constraints-formal-languages-and-feasible-geometry
    primary_evidence:
      - url: https://papers.nips.cc/paper/2020/hash/9578a63fbe545bd82cc5bbe749636af1-Abstract.html
        maturity: peer_reviewed
        supports: Modular surjective and stochastic transformations with exact or bounded likelihood terms.
      - url: https://papers.neurips.cc/paper_files/paper/2023/hash/572a6f16ec44f794fb3e0f8a310acbc6-Abstract-Conference.html
        maturity: peer_reviewed
        supports: Manifold-flow modeling and lower-dimensional latent structure.
    assumptions:
      family_independent:
        - Base measure and observed versus auxiliary variables are declared.
      family_specific:
        - Fibre integration, chart volume, or auxiliary marginalization replaces ordinary bijective algebra.
    failure_boundaries:
      - One inverse branch does not score a surjection.
      - A manifold density is not an ambient Lebesgue density.
      - Exact joint density does not imply tractable observed marginal density.
    pedagogy:
      orientation: Three-to-two-state finite surjection.
      formalism: Fibre sum, manifold metric determinant, and auxiliary integral.
      practice: Measure and likelihood-interface audit.
      research: Topology, chart coverage, and variational boundaries.
    implementation_status: validated

  - id: quantizer_composition_and_prior_codesign
    name: Structured quantization, variable visual units, and tokenizer-prior co-design
    abstraction_layer: representation
    canonical_definition: >-
      Compose quantizers across residual levels or coordinate groups and evaluate
      the resulting discrete interface jointly with the downstream generative prior.
    gap: >-
      FSQ and general hierarchy were covered, but RVQ, implicit alphabets, and
      downstream-aligned tokenizer training lacked formal and compute treatment.
    decision: accepted
    rationale: >-
      Quantizer structure changes token count, alphabet, bitrate, dependencies,
      streaming, generator cost, and failure localization.
    canonical_owner: representations-and-multimodal-systems.md#residual-product-and-lookup-free-quantization
    cross_links:
      - vae-explained.md
      - autoregressive-explained.md
      - discrete-iterative-generation-explained.md
      - compute-and-controlled-comparisons.md
    primary_evidence:
      - url: https://arxiv.org/abs/2107.03312
        maturity: peer_reviewed_conference_version
        supports: Residual quantization and structured quantizer dropout in an audio codec.
      - url: https://openreview.net/forum?id=gzqrANCF4g
        maturity: peer_reviewed
        supports: Lookup-free quantization in a visual tokenizer.
      - url: https://iclr.cc/virtual/2026/poster/10011804
        maturity: peer_reviewed
        supports: Downstream-denoising-aligned tokenizer training across named image generators.
      - url: https://openaccess.thecvf.com/content/CVPR2026/html/Srivastava_DPAR_Dynamic_Patchification_for_Efficient_Autoregressive_Visual_Generation_CVPR_2026_paper.html
        maturity: peer_reviewed
        supports: Entropy-guided variable patch aggregation for visual autoregressive generation under named ImageNet protocols.
      - url: https://openreview.net/forum?id=jwRAIYoVJn
        maturity: peer_reviewed
        supports: One shared discrete visual tokenizer as an understanding-generation system interface.
    assumptions:
      family_independent:
        - Nominal bits, entropy, actual bitrate, reconstruction, and prior cost are reported separately.
        - Fixed or variable token units declare their boundaries, sequence length, and compute policy.
      family_specific:
        - Audio streaming, image grids, video stride, and scientific state require different distortion and latency measures.
    failure_boundaries:
      - No explicit lookup table does not imply zero rate or small effective alphabet.
      - Code utilization does not prove semantic value or downstream prior quality.
      - A downstream proxy does not define a task-independent optimal tokenizer.
      - Sharing a tokenizer does not prove identical sufficient statistics for understanding and generation.
    pedagogy:
      orientation: Two-bit lossless representation comparison.
      formalism: RVQ recursion and nominal-rate expression.
      practice: Codec/vocabulary/prior interface audit.
      research: Downstream co-design evidence boundary.
    implementation_status: validated

