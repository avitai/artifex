      Select or infer a conditional-independence graph, DAG equivalence class,
      or posterior over graphical-model structures from repeated observations
      under a declared probability family, score or conditional-independence
      test, regularization or prior, and hidden-variable assumptions.
    gap: >-
      The curriculum distinguished fixed graphical models, graph-valued
