      orientation: Four graph objects separated by the observations and query that define them.
      formalism: Gaussian likelihood and precision zeros, graphical lasso, Ising neighborhoods, Schur complements, and DAG equivalence.
      practice: Penalty sensitivity, resampling stability, latent-variable diagnostics, held-out joint queries, and posterior or equivalence reporting.
      research: High-dimensional recovery assumptions, sparse-plus-low-rank identifiability, restricted efficient Bayes-net learning, and task-conditioned learned adjacency through July 2026.
    implementation_status: validated

