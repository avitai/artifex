      - url: https://openreview.net/forum?id=fVMr2sTow5
        maturity: peer_reviewed
        supports: TMLR graph-structure learning for a GNN prediction model through approximate marginal likelihood.
      - url: https://proceedings.neurips.cc/paper_files/paper/2025/hash/1ecbfd5ea3a5745d5302c0c3ee35eb3a-Abstract-Conference.html
        maturity: peer_reviewed
        supports: Distribution learning for Bayes-net classes under fixed chordal-skeleton and bounded-indegree restrictions.
    assumptions:
      family_independent:
        - The graph's node variables, edge semantics, observation regime, and target query are declared.
        - The model class, score or tests, regularization or prior, and hidden-variable assumptions are declared.
        - Uncertainty is reported as an equivalence class, stability measure, posterior, or assumption-conditional result rather than hidden by one diagram.
      family_specific:
        - Gaussian precision zeros require a nonsingular joint Gaussian law; discrete pseudolikelihood and neighborhood selection have different compatibility and recovery conditions.
        - Directed observational structure does not inherit causal semantics, and a task-trained GNN adjacency does not inherit graphical-model conditional-independence semantics.
    failure_boundaries:
      - Covariance thresholding does not recover a Gaussian conditional-independence graph.
      - A sparse observed graph can summarize dependence induced by latent common variables.
      - Penalty choice, finite-sample error, weak signals, and misspecification can change selected edges.
      - A selected adjacency is not a generator until factors, parameters, support, normalization, and sampling are defined.
      - Predictive, dependency, random-graph, and causal edges are not interchangeable.
