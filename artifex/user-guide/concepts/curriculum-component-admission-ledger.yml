        maturity: peer_reviewed
        supports: Extended-target particle MCMC and pseudo-marginal particle likelihood correction.
      - url: https://www.jmlr.org/papers/v15/lindsten14a.html
        maturity: peer_reviewed
        supports: Particle Gibbs with ancestor sampling for path degeneracy and mixing.
      - url: https://proceedings.mlr.press/v139/corenflos21a.html
        maturity: peer_reviewed
        supports: Entropy-regularized optimal-transport resampling with differentiability and convergence qualifications.
      - url: https://proceedings.neurips.cc/paper_files/paper/2022/hash/fddc79681b2df2734c01444f9bc2a17e-Abstract-Conference.html
        maturity: peer_reviewed
        supports: Learned smoothing twists and variational SMC objectives.
      - url: https://proceedings.neurips.cc/paper_files/paper/2023/hash/63e8bc7bbf1cfea36d1d1b6538aecce5-Abstract-Conference.html
        maturity: peer_reviewed
        supports: Twisted SMC for conditional diffusion sampling under the paper's asymptotic construction.
      - url: https://proceedings.neurips.cc/paper_files/paper/2025/hash/d6484394c4cb5e1f4ecad8d90b912025-Abstract-Conference.html
        maturity: peer_reviewed
        supports: SMC-based inference-time diffusion alignment under a bounded proposal and reward protocol.
      - url: https://arxiv.org/abs/2601.21104
        maturity: preprint
        supports: A 2026 research direction combining multilevel ideas and SMC for training-free diffusion inference.
    assumptions:
      family_independent:
        - Targets, base measures, proposals, potentials, backward kernels, resampling order, and returned queries are declared.
        - Proposal support covers every target-relevant state and importance weights are integrable under the required theorem.
        - Resampling is unbiased or otherwise paired with the exact construction used to justify the estimator.
        - Normalizer, normalized expectation, selected path, gradient, and generated endpoint retain separate finite-particle contracts.
      family_specific:
        - State-space filtering uses growing path targets and observation-aware proposals.
        - Static Bayesian and energy targets use tempering, data sequences, and invariant mutation kernels.
        - Learned generator compositions require model-specific path potentials, proposal densities or transitions, and endpoint correction.
    failure_boundaries:
      - Resampling manages current weight concentration but can worsen particle impoverishment and ancestral-path collapse.
      - Equal post-resampling weights and high importance ESS cannot certify support coverage or smoothing accuracy.
      - Systematic resampling has no unconditional variance dominance over multinomial resampling for every particle ordering and estimate.
      - A standard unbiased normalizer estimate does not make its logarithm or a normalized particle expectation unbiased.
      - A differentiable particle computation need not provide an unbiased exact-likelihood gradient.
      - An approximate learned twist or proposal does not make a fixed-particle conditional generator exact.
    pedagogy:
      orientation: Three-stage particle flow and a finite three-state target sequence separate target, algorithm, and returned query.
      formalism: Feynman–Kac path measure, generic weights, resampling offspring moments, bootstrap and adapted filters, backward kernels, smoothing, PMCMC, CESS, and twisting.
      practice: Binary exact-versus-particle filter, offspring calculation, adaptive tempering step, rare-event factorization, reporting ledger, and repeated-run validation.
      research: Differentiable resampling, variational particle objectives, smoothing twists, PMCMC hybrids, diffusion and discrete-generator control, and bounded 2026 preprints.
    implementation_status: validated

