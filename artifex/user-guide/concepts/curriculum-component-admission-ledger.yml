      orientation: A two-state exact filter and smoother separates information sets before any Gaussian approximation.
      formalism: Bayesian prediction and correction, predictive evidence, Kalman and RTS equations, backward kernels, moment projection, ensembles, particles, and validation statistics.
      practice: Scalar executable examples, missing-data and numerical contracts, limiting-case tests, compute ledgers, method selection, and cross-time path diagnostics.
      research: Differentiable and learned filters, temporal scans, analytic learned structure, robust updates, multimodal beliefs, and peer-reviewed or explicitly labeled 2026 work.
    implementation_status: validated

