acceptance_result:
  coverage_updates:
    - A complete cross-family volume now owns conditioning, change of measure, hard constraints, selection, and retrieval.
    - A complete cross-family volume now owns likelihood, evidence, partition-function, and normalizer-ratio estimators and their uncertainty contracts.
    - A complete cross-family volume now owns graphical inference, exact message reuse, loopy approximation, compilation, and learned-message boundaries.
    - A complete cross-family inference volume now owns state-space filtering, smoothing, Gaussian closure, nonlinear projection, ensembles, learned filters, and validation boundaries.
    - A complete Foundations volume now owns sequential targets, proper weighting, resampling, particle and genealogical degeneracy, proposal adaptation, smoothing, PMCMC, static SMC, learned twists, and particle-guided generators.
    - The graphical-inference volume now owns posterior decision-query distinctions, information-form Gaussian messages, and exact-versus-approximate randomized optimization samplers.
    - The latent-inference volume now owns the CAVI-to-ADVI algorithm ladder, richer guide interfaces, weighted and wake-sleep objectives, and semi-amortized refinement; the graphical-inference volume owns EP site semantics.
    - The sampling foundation now owns iid Monte Carlo uncertainty, rejection efficiency, generic variance reduction, QMC/RQMC, fixed-randomness objectives, and multilevel coupling without promoting estimator designs to model families.
    - The classical foundation now owns dependency-graph structure learning and routes random-graph, inference, learned-computation, and causal semantics to their distinct owners.
    - The flow guide now derives surjective, injective, and augmented likelihood semantics.
    - The representation guide now derives RVQ, product/lookup-free quantization, and tokenizer-prior co-design.
    - The representation guide now separates adaptation protocols, CKA-style diagnostics, contrastive view laws, and auxiliary generative representation alignment.
    - Autoregressive constrained decoding now distinguishes local masking from exact global conditioning.
  non_duplication_result: >-
    Ten source-derived candidates already had complete or expanded canonical owners and
    were merged rather than rewritten. Three generic labels were rejected.
  family_boundary: >-
    None of the accepted components is recorded as a new model family. They
    change targets, parameterizations, paths, feasible sets, decisions, or
    system composition while preserving the identity of their owning families.
