    primary_evidence:
      - url: https://doi.org/10.1109/18.910572
        maturity: peer_reviewed
        supports: Factor-graph semantics and exact sum-product on cycle-free graphs.
      - url: https://doi.org/10.1016/S0004-3702(99)00059-4
        maturity: peer_reviewed
        supports: Bucket elimination and induced-width time-space complexity.
      - url: https://doi.org/10.1111/j.2517-6161.1988.tb01721.x
        maturity: peer_reviewed
        supports: Exact local computation and junction-tree foundations.
      - url: https://doi.org/10.1109/TIT.2005.850085
        maturity: peer_reviewed
        supports: Bethe fixed-point and generalized belief-propagation relationships.
      - url: https://proceedings.neurips.cc/paper/2020/hash/07217414eb3fbe24d4e5b6cafb91ca18-Abstract.html
        maturity: peer_reviewed
        supports: Parameterized belief-propagation operators on factor graphs.
      - url: https://openreview.net/forum?id=GbLvncuryy
        maturity: preprint
        supports: 2026 factor-structured score computation and generative composition under declared graph assumptions.
    assumptions:
      family_independent:
        - The factors, support, evidence, base measure, and requested query are declared.
        - Exact guarantees state graph acyclicity or cluster width, local operation exactness, and numerical convention.
        - Approximate guarantees separate convergence, local consistency, and accuracy.
      family_specific:
        - Discrete tables, Gaussian factors, symbolic circuits, and neural factors expose different local operations and compression opportunities.
        - Learned messages require a training-instance distribution and do not inherit probabilistic semantics from a generic graph architecture.
    failure_boundaries:
      - Small local factors or few learned parameters do not guarantee low induced width.
      - Converged loopy messages need not equal exact marginals.
      - A tree of exponentially large cliques can be exact and impractical.
      - Compilation is exact algebraic reuse; amortized neural inference is an empirically evaluated approximation unless separately proved.
    pedagogy:
      orientation: One binary chain enumerated exactly with factor-graph and plate-notation distinctions.
      formalism: Variable elimination, treewidth, sum-product, junction trees, Bethe free energy, and log-partition derivatives.
      practice: Ordering, scaling, damping, residual, calibration, cache, and learned-solver reporting contracts.
      research: Differentiable and neural messages, circuit compilation, structured scores, and evidence through July 2026.
    implementation_status: validated

  - id: dependency_graph_structure_learning
    name: Dependency-graph and Bayesian-network structure learning
    abstraction_layer: model_selection
